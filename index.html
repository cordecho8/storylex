<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"/>
  <title>Sage English</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f4f0; --surface: #ffffff; --surface2: #f0efe9; --border: #e4e2da;
      --text: #1c1b18; --muted: #7c7a72;
      --accent: #2a6049; --accent-light: #e0ede7; --accent-hover: #1e4a37;
      --yellow: #fef3c0; --yellow-border: #f5c842; --yellow-active: #fde68a;
      --blue-bg: #eff6ff; --blue-border: #93c5fd;
      --green: #16a34a; --green-light: #dcfce7;
      --red: #dc2626; --red-light: #fee2e2;
      --orange: #ea580c; --orange-light: #ffedd5;
      --shadow-lg: 0 8px 40px rgba(0,0,0,.12);
      --sw: 280px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; }

    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: 44px; background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; padding: 0 14px;
    }
    .hd-left { display: flex; align-items: center; gap: 8px; }
    .menu-btn { display: none; width: 32px; height: 32px; border-radius: 7px; background: transparent; border: none; cursor: pointer; font-size: 17px; align-items: center; justify-content: center; color: var(--muted); flex-shrink: 0; }
    .menu-btn:hover { background: var(--surface2); color: var(--text); }
    .hd-logo-mobile { display: none; font-family: 'Lora', serif; font-size: 16px; font-weight: 500; color: var(--accent); }
    .kokoro-status { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #d1d5db; }
    .status-dot.ok { background: #22c55e; }

    .layout { display: grid; grid-template-columns: var(--sw) 1fr; height: calc(100vh - 44px); margin-top: 44px; }

    .sidebar { background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; transition: transform 0.25s ease; }
    .sidebar-top { padding: 14px 16px 12px; border-bottom: 1px solid var(--border); }
    .sidebar-logo { font-family: 'Lora', serif; font-size: 17px; font-weight: 500; color: var(--accent); display: flex; align-items: center; gap: 7px; margin-bottom: 1px; }
    .sidebar-logo-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }
    .sidebar-label { font-size: 10px; letter-spacing: 0.8px; font-weight: 500; color: var(--muted); margin-top: 3px; }
    .chapter-list { flex: 1; overflow-y: auto; padding: 0; }
    .ch-item { display: flex; align-items: center; gap: 10px; padding: 11px 16px 11px 20px; cursor: pointer; transition: background 0.12s; border-bottom: 1px solid var(--border); position: relative; }
    .ch-item:hover { background: var(--surface2); }
    .story-chapters .ch-item:last-child { border-bottom: none; }
    .ch-item.active { background: var(--accent-light); padding-left: 17px; border-left: 3px solid var(--accent); }
    .ch-num { font-size: 10px; font-weight: 600; color: var(--muted); min-width: 18px; flex-shrink: 0; font-variant-numeric: tabular-nums; }
    .ch-item.active .ch-num { color: var(--accent); }
    .ch-info { flex: 1; min-width: 0; }
    .ch-name { font-size: 13px; font-weight: 500; line-height: 1.35; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
    /* badges hidden by default, shown on hover and active */
    .ch-meta { display: flex; gap: 4px; margin-top: 3px; opacity: 0; transition: opacity 0.15s; height: 0; overflow: hidden; }
    .ch-item:hover .ch-meta, .ch-item.active .ch-meta { opacity: 1; height: auto; }
    .ch-badge { display: inline-block; font-size: 10px; padding: 1px 5px; border-radius: 20px; background: var(--surface2); color: var(--muted); }
    .ch-item.active .ch-badge { background: var(--accent); color: white; }
    .ch-due { display: inline-block; font-size: 10px; padding: 1px 5px; border-radius: 20px; background: var(--orange-light); color: var(--orange); }
    .sidebar-footer { padding: 10px; border-top: 1px solid var(--border); }
    .all-srs-btn { width: 100%; padding: 10px; border: none; background: var(--accent-light); border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600; color: var(--accent); cursor: pointer; transition: all 0.15s; letter-spacing: 0.2px; }
    .all-srs-btn:hover { background: var(--accent); color: white; transform: translateY(-1px); box-shadow: 0 3px 10px rgba(42,96,73,.2); }

    /* Story accordion */
    .story-group { border-bottom: 1px solid var(--border); }
    .story-group:last-child { border-bottom: none; }
    .story-header { display: flex; align-items: center; justify-content: space-between; padding: 11px 14px 11px 12px; cursor: pointer; user-select: none; transition: background 0.12s; gap: 8px; }
    .story-header:hover { background: var(--surface2); }
    .story-header-left { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .story-name { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .story-meta { font-size: 10px; color: var(--muted); }
    .story-chevron { font-size: 9px; color: var(--muted); transition: transform 0.2s; flex-shrink: 0; opacity: 0.6; }
    .story-group.open .story-chevron { transform: rotate(180deg); }
    .story-chapters { overflow: hidden; max-height: 0; transition: max-height 0.28s cubic-bezier(.4,0,.2,1); }
    .story-group.open .story-chapters { max-height: 1200px; }

    .main { overflow-y: auto; padding: 32px 44px; }
    .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 12px; text-align: center; color: var(--muted); }
    .empty-icon { font-size: 40px; opacity: 0.2; margin-bottom: 4px; }
    .empty h3 { font-family: 'Lora', serif; font-size: 22px; color: var(--text); font-weight: 500; }
    .empty p { font-size: 13px; max-width: 260px; line-height: 1.75; color: var(--muted); }

    .chapter-view { max-width: 680px; }
    .chapter-header { padding-bottom: 22px; border-bottom: 1px solid var(--border); margin-bottom: 22px; }
    .ch-eyebrow { font-size: 11px; text-transform: uppercase; letter-spacing: 1.2px; font-weight: 600; color: var(--accent); margin-bottom: 7px; opacity: 0.85; }
    .ch-title { font-family: 'Lora', serif; font-size: 29px; font-weight: 500; line-height: 1.28; color: var(--text); }

    /* Underline tabs — cleaner, editorial feel */
    .tabs { display: flex; gap: 0; background: none; padding: 0; border-radius: 0; width: 100%; margin-bottom: 24px; border-bottom: 1px solid var(--border); }
    .tab { flex: none; padding: 8px 16px; border-radius: 0; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; color: var(--muted); border: none; background: none; font-family: 'Inter', sans-serif; white-space: nowrap; text-align: center; border-bottom: 2px solid transparent; margin-bottom: -1px; letter-spacing: 0.1px; }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

    .story-box { background: var(--surface); border: none; border-radius: 0; padding: 4px 0 20px; margin-bottom: 0; }
    .story-text { font-family: 'Lora', serif; font-size: 17px; line-height: 2.05; color: var(--text); }
    .story-text p { margin-bottom: 1.4em; }
    .story-text p:last-child { margin-bottom: 0; }

    /* ── SRS CARD — elevated, warm ─────────────────────────────────────── */
    @keyframes cardReveal { from { opacity:0; transform: translateY(6px) scale(0.99); } to { opacity:1; transform: translateY(0) scale(1); } }
    @keyframes cardFlip  { from { opacity:0; transform: translateY(-4px); } to { opacity:1; transform: translateY(0); } }

    .vocab-chip { display: inline-flex; align-items: center; background: var(--yellow); border-bottom: 2px solid var(--yellow-border); border-radius: 3px; padding: 1px 2px 0 3px; cursor: pointer; transition: background 0.12s; white-space: nowrap; gap: 0; }
    .vocab-chip:hover, .vocab-chip:active { background: var(--yellow-active); }
    .vocab-chip .meaning { font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 500; color: #92610a; margin-left: 2px; }
    .vocab-chip .snd { font-size: 15px; margin-left: 4px; opacity: 0.7; line-height: 1; padding: 2px 3px; border-radius: 3px; cursor: pointer; transition: opacity 0.1s, background 0.1s; flex-shrink: 0; }
    .vocab-chip .snd:hover { opacity: 1; background: rgba(0,0,0,0.06); }
    .vocab-blank { display: inline-block; background: var(--blue-bg); border-bottom: 2px solid var(--blue-border); border-radius: 3px; padding: 1px 12px 0; cursor: pointer; min-width: 54px; min-height: 21px; transition: background 0.12s; white-space: nowrap; }
    .vocab-blank:hover, .vocab-blank:active { background: #dbeafe; }
    .vocab-blank .wr { display: none; font-size: 13px; font-weight: 600; color: #1d4ed8; font-family: 'Inter', sans-serif; }
    .vocab-blank.revealed .wr { display: inline; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.55} }
    .vocab-chip.playing, .vocab-blank.playing, .srs-play.playing { animation: pulse 0.5s 2; }
    .vocab-row.playing td { background: var(--yellow) !important; }

    .vtable { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); font-size: 14px; }
    .vtable thead tr { background: var(--surface2); border-bottom: 1px solid var(--border); }
    .vtable th { padding: 9px 14px; text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600; color: var(--muted); }
    .vtable tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; cursor: pointer; }
    .vtable tbody tr:last-child { border-bottom: none; }
    .vtable tbody tr:hover { background: var(--surface2); }
    .vtable td { padding: 9px 14px; vertical-align: middle; }
    .td-word { font-family: 'Lora', serif; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 7px; }
    .play-btn { width: 24px; height: 24px; border-radius: 50%; background: var(--accent-light); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 9px; transition: all 0.12s; flex-shrink: 0; }
    .play-btn:hover { background: var(--accent); color: white; }

    /* SRS */
    .srs-wrap { max-width: 640px; }
    .srs-filter { display: flex; gap: 6px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
    .srs-fl { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; }
    .srs-fb { padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); font-family: 'Inter', sans-serif; font-size: 11px; cursor: pointer; transition: all 0.12s; color: var(--muted); }
    .srs-fb.active { background: var(--accent); color: white; border-color: var(--accent); }

    .srs-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 36px 32px 30px;
      text-align: center;
      margin-bottom: 12px;
      min-height: 210px;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
      box-shadow: 0 4px 24px rgba(42,96,73,.07), 0 1px 4px rgba(0,0,0,.05);
      animation: cardReveal 0.2s ease both;
    }
    .srs-ch { font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--muted); }
    .srs-word { font-family: 'Lora', serif; font-size: 38px; font-weight: 500; letter-spacing: -0.5px; animation: cardFlip 0.18s ease both; }
    .srs-ctx { font-family: 'Lora', serif; font-size: 15px; color: var(--muted); line-height: 1.75; max-width: 460px; font-style: italic; }
    .srs-ctx .bw { color: var(--accent); font-weight: 500; font-style: normal; }
    .srs-meaning { font-size: 20px; color: var(--accent); font-weight: 500; padding: 9px 22px; background: var(--accent-light); border-radius: 8px; animation: cardFlip 0.18s ease both; }
    .srs-play { width: 42px; height: 42px; border-radius: 50%; background: var(--accent); border: none; cursor: pointer; font-size: 15px; color: white; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .srs-play:hover { background: var(--accent-hover); transform: scale(1.08); box-shadow: 0 3px 12px rgba(42,96,73,.3); }
    .srs-prog { font-size: 11px; color: var(--muted); letter-spacing: 0.5px; }

    .srs-reveal { width: 100%; padding: 15px; background: var(--text); color: white; border: none; border-radius: 12px; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; margin-bottom: 10px; transition: opacity 0.15s, transform 0.1s; letter-spacing: 0.2px; }
    .srs-reveal:hover { opacity: 0.88; transform: translateY(-1px); }
    .srs-reveal:active { transform: translateY(0); }

    /* Asymmetric grade buttons — "Got it!" is visually primary */
    .srs-grades { display: grid; grid-template-columns: 1fr 1fr 1.3fr; gap: 8px; width: 100%; }
    .srs-g { padding: 13px 8px; border-radius: 12px; border: none; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; text-align: center; }
    .srs-g:hover { transform: translateY(-2px); }
    .srs-g:active { transform: translateY(0); }
    .srs-g .gl { display: block; font-size: 10px; opacity: 0.65; margin-top: 3px; }
    .srs-g.again { background: var(--red-light); color: var(--red); }
    .srs-g.again:hover { background: var(--red); color: white; box-shadow: 0 4px 12px rgba(220,38,38,.2); }
    .srs-g.hard { background: var(--orange-light); color: var(--orange); }
    .srs-g.hard:hover { background: var(--orange); color: white; box-shadow: 0 4px 12px rgba(234,88,12,.2); }
    .srs-g.good { background: var(--accent); color: white; font-size: 14px; font-weight: 600; }
    .srs-g.good:hover { background: var(--accent-hover); box-shadow: 0 4px 14px rgba(42,96,73,.3); }
    .srs-g.good .gl { opacity: 0.75; }

    .srs-done { text-align: center; padding: 52px 28px; background: var(--surface); border: 1px solid var(--border); border-radius: 18px; box-shadow: 0 4px 24px rgba(42,96,73,.07); }
    .srs-done .di { font-size: 52px; margin-bottom: 14px; }
    .srs-done h3 { font-family: 'Lora', serif; font-size: 24px; margin-bottom: 8px; }
    .srs-done p { font-size: 14px; color: var(--muted); margin-bottom: 22px; line-height: 1.6; }

    .hint-bar { font-size: 13px; color: var(--muted); margin-bottom: 18px; padding: 10px 14px; background: var(--surface2); border-radius: 8px; border-left: 2px solid var(--accent); line-height: 1.5; }
    .vtitle { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; color: var(--muted); margin-bottom: 12px; }

    .btn { padding: 9px 18px; border-radius: 9px; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; border: none; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(42,96,73,.25); }
    .btn-ghost { background: none; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--surface2); color: var(--text); }

    .tooltip { position: fixed; z-index: 300; background: #1c1b18; color: white; padding: 6px 11px; border-radius: 8px; font-size: 12px; pointer-events: none; opacity: 0; transition: opacity 0.1s; white-space: nowrap; box-shadow: 0 4px 16px rgba(0,0,0,.2); }
    .tooltip.show { opacity: 1; }
    .tooltip .tw { font-weight: 600; color: #fef3c0; }
    .tooltip .tm { color: #d1fae5; margin-left: 4px; }

    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 90; }

    /* ── TOUCH / MOBILE GLOBAL ───────────────────────────────────────────── */
    * { -webkit-tap-highlight-color: transparent; }
    button, [role="button"], .ch-item, .vocab-chip, .vocab-blank, .story-header, .tab {
      touch-action: manipulation; /* prevent 300ms delay */
    }

    @media (max-width: 900px) {
      /* iPad: slightly tighter sidebar */
      :root { --sw: 260px; }
    }

    @media (max-width: 700px) {
      .menu-btn { display: flex; }
      .hd-logo-mobile { display: block; }
      .layout { grid-template-columns: 1fr; }
      .sidebar { position: fixed; top: 44px; left: 0; bottom: 0; width: min(var(--sw), 85vw); z-index: 95; transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .sidebar-overlay.open { display: block; }
      .main { padding: 20px 18px calc(env(safe-area-inset-bottom, 0px) + 80px); }

      /* Bigger touch targets for chapter items */
      .ch-item { padding: 13px 16px 13px 20px; }
      .ch-item.active { padding-left: 17px; }
      .story-header { padding: 13px 14px 13px 12px; }

      /* SRS card */
      .srs-wrap { max-width: 100%; }
      .srs-card { padding: 28px 20px 24px; min-height: 200px; border-radius: 16px; }
      .srs-word { font-size: 32px; }
      .srs-reveal { padding: 17px; font-size: 15px; border-radius: 12px; }
      /* Grade buttons: bigger tap area, stack label inside nicely */
      .srs-grades { gap: 10px; }
      .srs-g { padding: 14px 8px; font-size: 13px; border-radius: 12px; }
      .srs-g.good { font-size: 14px; }
      .srs-g .gl { font-size: 10px; }

      /* Chapter header */
      .ch-title { font-size: 22px; }
      .chapter-header { padding-bottom: 16px; margin-bottom: 16px; }

      /* Tabs: scrollable on very small screens */
      .tabs { overflow-x: auto; -webkit-overflow-scrolling: touch; gap: 0; }
      .tabs::-webkit-scrollbar { display: none; }
      .tab { font-size: 12px; padding: 10px 14px; flex-shrink: 0; }

      /* Story text */
      .story-text { font-size: 15px; line-height: 2.0; }
      .story-box { padding: 0; }

      /* Vocab table: hide due-date column on small screens */
      .vtable th:last-child, .vtable td:last-child { display: none; }

      /* Bottom sheet: taller on short phones */
      #mobileSheetPanel { padding-bottom: max(env(safe-area-inset-bottom, 0px), 16px); }
      .ms-action { padding: 15px 12px; font-size: 15px; }

      /* Filter buttons: larger */
      .srs-fb { padding: 7px 14px; font-size: 12px; }

      /* Nav buttons */
      .ch-nav-btn { padding: 12px 14px; }

      /* Bookmarks */
      .bookmark-card { padding: 14px; }
      .bk-play, .bk-remove { width: 36px; height: 36px; }
    }

    @media (max-width: 380px) {
      /* Small phones (iPhone SE etc) */
      .srs-word { font-size: 28px; }
      .tab { padding: 9px 11px; font-size: 11px; }
      .srs-grades { grid-template-columns: 1fr 1fr 1.2fr; gap: 7px; }
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    /* ── CHAPTER READ STATE ──────────────────────────────────────────────── */
    .ch-item.read .ch-name { color: var(--muted); }
    .ch-item.read .ch-num { color: var(--accent); opacity: 0.5; }
    .ch-item { position: relative; }
    .ch-item.read { background: linear-gradient(to right, var(--accent-light) 3px, transparent 3px); }

    /* ── MOBILE BOTTOM SHEET ─────────────────────────────────────────────── */
    #mobileSheet { position: fixed; inset: 0; z-index: 600; }
    #mobileSheetOverlay { position: absolute; inset: 0; background: rgba(0,0,0,.35); }
    #mobileSheetPanel {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: var(--surface); border-radius: 16px 16px 0 0;
      padding: 0 0 env(safe-area-inset-bottom,16px);
      box-shadow: 0 -4px 30px rgba(0,0,0,.15);
      animation: sheetUp 0.22s cubic-bezier(.32,1,.6,1) both;
    }
    @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .ms-handle { width: 36px; height: 4px; background: var(--border); border-radius: 99px; margin: 10px auto 14px; }
    .ms-word-row { display: flex; align-items: center; gap: 10px; padding: 0 20px 6px; }
    .ms-word { font-family: 'Lora', serif; font-size: 22px; font-weight: 500; flex: 1; }
    .ms-meaning { font-size: 13px; color: var(--muted); padding: 0 20px 14px; border-bottom: 1px solid var(--border); }
    .ms-actions { padding: 8px 12px 8px; display: flex; flex-direction: column; gap: 4px; }
    .ms-action {
      display: flex; align-items: center; gap: 10px;
      padding: 13px 12px; border-radius: 10px; border: none;
      font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500;
      cursor: pointer; background: var(--surface2); color: var(--text);
      text-align: left; width: 100%; transition: all 0.1s;
    }
    .ms-action:hover { background: var(--border); }
    .ms-action.srs { background: var(--accent-light); color: var(--accent); margin-top: 2px; }
    .ms-action.srs:hover { background: var(--accent); color: white; }
    .ms-action-icon { font-size: 16px; width: 22px; text-align: center; }
    .ms-action.active { background: var(--accent-light); color: var(--accent); }

    /* ── WORD ACTION POPUP ───────────────────────────────────────────────── */
    #wordPopup {
      position: fixed; z-index: 500;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,.14), 0 2px 8px rgba(0,0,0,.06);
      padding: 0;
      min-width: 200px;
      opacity: 0;
      transform: translateY(4px) scale(0.97);
      transition: opacity 0.15s ease, transform 0.15s ease;
      pointer-events: none;
      overflow: hidden;
    }
    #wordPopup.show {
      opacity: 1;

<script>
// ── ACCESS GATE ───────────────────────────────────────────────────────────────
// Auth state is stored in localStorage so the user stays logged in
// across sessions unless they manually clear their browser data.
const AUTH_KEY = 'se_auth_v1';

function isAuthed() {
  try { return !!localStorage.getItem(AUTH_KEY); } catch(e) { return false; }
}

function saveAuth(code) {
  try { localStorage.setItem(AUTH_KEY, code); } catch(e) {}
}

function validateCode(input) {
  const clean = input.trim().toUpperCase().replace(/[^A-Z0-9]/g, '');
  // Must be 4 letters + 4 digits, ending in 88, no 4s anywhere
  if (!/^[A-Z]{4}[0-9]{4}$/.test(clean)) return false;
  if (/4/.test(clean)) return false;
  if (!clean.endsWith('88')) return false;
  return (typeof VALID_CODES !== 'undefined') && VALID_CODES.includes(clean);
}

function bootGate() {
  const gate = document.getElementById('gate');

  // Already authenticated — hide gate immediately and launch app
  if (isAuthed()) {
    gate.classList.add('hidden');
    return;
  }

  // Show gate, wire up interactions
  const input = document.getElementById('gateInput');
  const btn   = document.getElementById('gateBtn');
  const err   = document.getElementById('gateError');

  // Auto-format: uppercase + strip non-alphanumeric as user types
  input.addEventListener('input', () => {
    const pos = input.selectionStart;
    input.value = input.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
    input.setSelectionRange(pos, pos);
    input.classList.remove('error');
    err.textContent = '';
  });

  // Submit on Enter
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') attemptUnlock();
  });

  btn.addEventListener('click', attemptUnlock);

  function attemptUnlock() {
    const code = input.value.trim().toUpperCase();

    if (code.length === 0) {
      showError('Please enter your access code.');
      return;
    }
    if (code.length !== 8) {
      showError('Code must be 8 characters (4 letters + 4 numbers).');
      shakeInput();
      return;
    }
    if (!validateCode(code)) {
      showError('Invalid code. Please check and try again.');
      shakeInput();
      return;
    }

    // Valid — save and launch
    input.classList.add('success');
    err.style.color = '#16a34a';
    err.textContent = 'Code accepted! Loading…';
    btn.disabled = true;

    saveAuth(code);

    setTimeout(() => {
      gate.style.transition = 'opacity 0.4s ease';
      gate.style.opacity = '0';
      setTimeout(() => { gate.classList.add('hidden'); gate.style.opacity = ''; }, 400);
    }, 600);
  }

  function showError(msg) {
    err.style.color = '#ef4444';
    err.textContent = msg;
  }

  function shakeInput() {
    input.classList.remove('error');
    void input.offsetWidth; // force reflow to restart animation
    input.classList.add('error');
  }
}

bootGate();

// ── SRS ENGINE (SM-2 simplified) ─────────────────────────────────────────────
const SRS_KEY = 'se_srs_v2';
function srsLoad() { try { return JSON.parse(localStorage.getItem(SRS_KEY)||'{}'); } catch(e) { return {}; } }
function srsSave(d) { try { localStorage.setItem(SRS_KEY, JSON.stringify(d)); } catch(e) {} }

function srsGrade(word, g) {
  const data = srsLoad();
  let c = data[word] || { interval:0, ease:2.5, due:0, reps:0, introduced:false };
  c.introduced = true; // mark as entered into SRS system
  if (g===0) { c.interval=1; c.ease=Math.max(1.3,c.ease-0.2); c.reps=0; }
  else if (g===1) { c.interval=c.reps===0?1:Math.max(1,Math.round(c.interval*1.2)); c.ease=Math.max(1.3,c.ease-0.15); c.reps++; }
  else { c.interval=c.reps===0?1:c.reps===1?3:Math.round(c.interval*c.ease); c.ease=Math.min(3.0,c.ease+0.1); c.reps++; }
  c.due = Date.now() + c.interval*86400000;
  data[word]=c; srsSave(data); return c;
}

function isDue(word) {
  const c = srsLoad()[word];
  // A word is only "due" if it has been studied at least once AND is past its due date
  if (!c || !c.introduced) return false;
  return c.due <= Date.now();
}

function wordState(word) {
  const c = srsLoad()[word];
  if (!c || !c.introduced) return 'new';
  if (!c.reps) return 'new';
  if (c.due<=Date.now()) return 'due';
  if (c.reps>=3) return 'known';
  return 'learning';
}

function nextDueLabel(word) {
  const c = srsLoad()[word];
  if (!c || !c.introduced) return '—';
  if (c.due<=Date.now()) return 'Due now';
  const d = Math.round((c.due-Date.now())/86400000);
  return d<1?'< 1 day':`${d} day${d!==1?'s':''}`;
}

// ── BOOKMARK ENGINE ───────────────────────────────────────────────────────────
const BK_KEY = 'se_bookmarks_v1';
function bkLoad() { try { return JSON.parse(localStorage.getItem(BK_KEY)||'[]'); } catch(e) { return []; } }
function bkSave(d) { try { localStorage.setItem(BK_KEY, JSON.stringify(d)); } catch(e) {} }
function bkIsBookmarked(word) { return bkLoad().some(b=>b.word.toLowerCase()===word.toLowerCase()); }
function bkAdd(word, meaning, chId, chTitle) {
  const d = bkLoad().filter(b=>b.word.toLowerCase()!==word.toLowerCase());
  d.unshift({word,meaning,chId,chTitle,addedAt:Date.now()});
  bkSave(d);
}
function bkRemove(word) {
  bkSave(bkLoad().filter(b=>b.word.toLowerCase()!==word.toLowerCase()));
}
function bkToggle(word, meaning, chId, chTitle) {
  if(bkIsBookmarked(word)) { bkRemove(word); return false; }
  else { bkAdd(word,meaning,chId,chTitle); return true; }
}

// ── PROGRESS TRACKING ─────────────────────────────────────────────────────────
const PROG_KEY = 'se_progress_v1';
function progLoad() { try { return JSON.parse(localStorage.getItem(PROG_KEY)||'{}'); } catch(e) { return {}; } }
function progSave(d) { try { localStorage.setItem(PROG_KEY, JSON.stringify(d)); } catch(e) {} }
function progGet(chId) {
  const d = progLoad(); return d[chId] || { wordsHeard:[], tabsVisited:[] };
}
function progMarkWord(chId, word) {
  const d = progLoad();
  if(!d[chId]) d[chId] = {wordsHeard:[], tabsVisited:[]};
  if(!d[chId].wordsHeard.includes(word.toLowerCase())) {
    d[chId].wordsHeard.push(word.toLowerCase());
    progSave(d);
    return true;
  }
  return false;
}
function progMarkTab(chId, tab) {
  const d = progLoad();
  if(!d[chId]) d[chId] = {wordsHeard:[], tabsVisited:[]};
  if(!d[chId].tabsVisited.includes(tab)) { d[chId].tabsVisited.push(tab); progSave(d); }
}
function progPct(chId, totalWords) {
  const p = progGet(chId);
  const tabs = (p.tabsVisited||[]).length;
  const words = (p.wordsHeard||[]).length;
  // 60% words heard + 40% tabs visited (read, recall, vocab, practice = 4 tabs)
  const wordScore = totalWords > 0 ? (words/totalWords)*60 : 0;
  const tabScore = (tabs/4)*40;
  return Math.min(100, Math.round(wordScore + tabScore));
}
function isChRead(chId) {
  const d = progLoad();
  return !!(d[chId] && d[chId].read);
}
function markChRead(chId) {
  const d = progLoad();
  if(!d[chId]) d[chId] = { wordsHeard:[], tabsVisited:[] };
  d[chId].read = true;
  progSave(d);
}

let progressToastTimer = null;
function showProgressToast(msg) {
  const old = document.querySelector('.progress-toast');
  if(old) old.remove();
  if(progressToastTimer) clearTimeout(progressToastTimer);
  const t = document.createElement('div');
  t.className = 'progress-toast';
  t.textContent = msg;
  document.body.appendChild(t);
  progressToastTimer = setTimeout(()=>{
    t.classList.add('out');
    setTimeout(()=>t.remove(), 200);
  }, 2000);
}

// ── APP STATE ─────────────────────────────────────────────────────────────────
let chapters=[], activeId=null, activeTab='read', openStoryId=null;
let currentAudio=null, currentPlayingEl=null;
let srsQueue=[], srsIdx=0, srsRevealed=false, srsFilter='all', srsAllMode=false;

// ── INIT ──────────────────────────────────────────────────────────────────────
function init() {
  if (window.CHAPTERS) chapters=[...window.CHAPTERS];
  // Auto-open the first story group
  if (chapters.length) openStoryId = chapters[0].story_id || 'story1';
  renderSidebar();
  if (chapters.length) selectChapter(chapters[0].id);
  checkAudio();
  document.getElementById('menuBtn').onclick=toggleSidebar;
  document.getElementById('overlay').onclick=closeSidebar;
  document.getElementById('allSrsBtn').onclick=()=>{ srsAllMode=true; activeId=null; activeTab='practice'; srsFilter='due'; renderMain(); closeSidebar(); };
}

function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('open'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('open'); }

// ── VOCAB PARSING ─────────────────────────────────────────────────────────────
function parseVocab(story) {
  const seen=new Set(), list=[];
  const re=/\{\{([^|]+)\|([^}]+)\}\}/g; let m;
  while((m=re.exec(story))!==null){ const w=m[1].trim(); if(!seen.has(w.toLowerCase())){ seen.add(w.toLowerCase()); list.push({word:w,meaning:m[2].trim()}); } }
  return list;
}

function allVocabList() {
  const seen=new Set(), list=[];
  chapters.forEach(ch=>{ parseVocab(ch.story).forEach(v=>{ if(!seen.has(v.word.toLowerCase())){ seen.add(v.word.toLowerCase()); list.push({...v,chId:ch.id,chTitle:ch.title}); } }); });
  return list;
}

function getContext(story, word) {
  const re=new RegExp(`\\{\\{${word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}\\|[^}]+\\}\\}`,'i');
  const parts=story.split('\n');
  for(const p of parts){ if(re.test(p)){ return p.replace(/\{\{([^|]+)\|([^}]+)\}\}/g,(_,w,m)=>w.trim().toLowerCase()===word.toLowerCase()?'__B__':w.trim()).trim(); } }
  return '';
}

// ── AUDIO ─────────────────────────────────────────────────────────────────────
function af(w){ return 'audio/'+w.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_-]/gi,'')+ '.mp3'; }

function playWord(word, el) {
  if(currentAudio){ currentAudio.pause(); currentAudio.currentTime=0; }
  if(currentPlayingEl){ currentPlayingEl.classList.remove('playing'); currentPlayingEl=null; }
  const a=new Audio(af(word)); currentAudio=a; currentPlayingEl=el;
  a.onplay=()=>el&&el.classList.add('playing');
  a.onended=()=>{ el&&el.classList.remove('playing'); currentAudio=null; currentPlayingEl=null; };
  a.onerror=()=>{
    el&&el.classList.remove('playing'); currentAudio=null; currentPlayingEl=null;
    if('speechSynthesis' in window){ const u=new SpeechSynthesisUtterance(word); u.lang='en-US'; u.rate=0.9; el&&(u.onstart=()=>el.classList.add('playing')); el&&(u.onend=()=>el.classList.remove('playing')); speechSynthesis.speak(u); }
  };
  a.play().catch(()=>{});
}

// ── TOOLTIP ───────────────────────────────────────────────────────────────────
const tooltip=document.getElementById('tooltip');
function showTip(w,m,e){ document.getElementById('tipW').textContent=w; document.getElementById('tipM').textContent=m; tooltip.classList.add('show'); moveTip(e); }
function moveTip(e){ let x=e.clientX-tooltip.offsetWidth/2,y=e.clientY-42; if(x<6)x=6; if(y<6)y=e.clientY+12; tooltip.style.left=x+'px'; tooltip.style.top=y+'px'; }
function hideTip(){ tooltip.classList.remove('show'); }
document.addEventListener('mousemove',e=>{ if(tooltip.classList.contains('show'))moveTip(e); });

// ── WORD POPUP ────────────────────────────────────────────────────────────────
let popupWord = null, popupMeaning = null, popupChId = null, popupChTitle = null;
const wordPopup = document.getElementById('wordPopup');

function isMobileDevice() { return window.innerWidth <= 700; }

function showWordPopup(word, meaning, chId, chTitle, targetEl) {
  popupWord = word; popupMeaning = meaning; popupChId = chId; popupChTitle = chTitle;
  if(isMobileDevice()) {
    showMobileSheet(word, meaning, chId, chTitle);
    return;
  }
  document.getElementById('wpWord').textContent = word;
  document.getElementById('wpMeaning').textContent = meaning;
  updatePopupBookmarkState();
  wordPopup.classList.add('show');
  positionPopup(targetEl);
}

// ── MOBILE BOTTOM SHEET ───────────────────────────────────────────────────────
function showMobileSheet(word, meaning, chId, chTitle) {
  const sheet = document.getElementById('mobileSheet');
  document.getElementById('msWord').textContent = word;
  document.getElementById('msMeaning').textContent = meaning;
  updateMobileSheetState();
  sheet.style.display = 'block';
}

function hideMobileSheet() {
  const sheet = document.getElementById('mobileSheet');
  const panel = document.getElementById('mobileSheetPanel');
  panel.style.animation = 'sheetDown 0.18s ease forwards';
  setTimeout(()=>{ sheet.style.display='none'; panel.style.animation=''; }, 180);
}

function updateMobileSheetState() {
  if(!popupWord) return;
  const isBk = bkIsBookmarked(popupWord);
  document.getElementById('msBkLabel').textContent = isBk ? '已收藏 ✓' : '收藏';
  document.getElementById('msBookmark').classList.toggle('active', isBk);
}

document.addEventListener('DOMContentLoaded', ()=>{
  const overlay = document.getElementById('mobileSheetOverlay');
  if(overlay) overlay.onclick = hideMobileSheet;

  const msPlayBtn = document.getElementById('msPlayBtn');
  if(msPlayBtn) msPlayBtn.onclick = (e) => {
    e.stopPropagation();
    if(popupWord) playWord(popupWord, msPlayBtn);
  };

  const msBookmark = document.getElementById('msBookmark');
  if(msBookmark) msBookmark.onclick = (e) => {
    e.stopPropagation();
    if(!popupWord) return;
    const added = bkToggle(popupWord, popupMeaning, popupChId, popupChTitle);
    updateMobileSheetState();
    document.querySelectorAll(`.vocab-chip[data-w="${CSS.escape(popupWord)}"]`).forEach(c=>{
      c.classList.toggle('bookmarked', bkIsBookmarked(popupWord));
    });
    showProgressToast(added ? '🔖 已收藏' : '已取消收藏');
  };

  const msSrs = document.getElementById('msSrs');
  if(msSrs) msSrs.onclick = (e) => {
    e.stopPropagation();
    if(!popupWord) return;
    const d = srsLoad();
    if(!d[popupWord.toLowerCase()] || !d[popupWord.toLowerCase()].introduced) {
      srsGrade(popupWord.toLowerCase(), 0);
    }
    showProgressToast('☆ 已加入复习');
    hideMobileSheet();
    renderSidebar();
  };
});

// CSS for sheet close animation (injected)
(function(){
  const s = document.createElement('style');
  s.textContent = '@keyframes sheetDown { from{transform:translateY(0)} to{transform:translateY(100%)} }';
  document.head.appendChild(s);
})();

function positionPopup(el) {
  const r = el.getBoundingClientRect();
  const pw = 210, ph = 130;
  let left = r.left + r.width/2 - pw/2;
  let top = r.bottom + 8;
  if(left < 8) left = 8;
  if(left + pw > window.innerWidth - 8) left = window.innerWidth - pw - 8;
  if(top + ph > window.innerHeight - 8) top = r.top - ph - 8;
  wordPopup.style.left = left + 'px';
  wordPopup.style.top = top + 'px';
  wordPopup.style.width = pw + 'px';
}

function hideWordPopup() { wordPopup.classList.remove('show'); }

function updatePopupBookmarkState() {
  if(!popupWord) return;
  const isBk = bkIsBookmarked(popupWord);
  document.getElementById('wpBkLabel').textContent = isBk ? '已收藏 ✓' : '收藏';
  document.getElementById('wpBookmark').classList.toggle('active', isBk);
}

document.getElementById('wpPlayBtn').onclick = (e) => {
  e.stopPropagation();
  if(popupWord) playWord(popupWord, document.getElementById('wpPlayBtn'));
};

document.getElementById('wpBookmark').onclick = (e) => {
  e.stopPropagation();
  if(!popupWord) return;
  const added = bkToggle(popupWord, popupMeaning, popupChId, popupChTitle);
  updatePopupBookmarkState();
  // Update chip appearance
  document.querySelectorAll(`.vocab-chip[data-w="${CSS.escape(popupWord)}"]`).forEach(c=>{
    c.classList.toggle('bookmarked', bkIsBookmarked(popupWord));
  });
  showProgressToast(added ? '🔖 已收藏' : '已取消收藏');
};

document.getElementById('wpSrs').onclick = (e) => {
  e.stopPropagation();
  if(!popupWord) return;
  // Introduce word to SRS immediately
  const d = srsLoad();
  if(!d[popupWord.toLowerCase()] || !d[popupWord.toLowerCase()].introduced) {
    srsGrade(popupWord.toLowerCase(), 0);
  }
  showProgressToast('☆ 已加入复习');
  hideWordPopup();
  renderSidebar();
};

document.addEventListener('click', (e) => {
  if(!wordPopup.contains(e.target) && !e.target.classList.contains('vocab-chip')) {
    hideWordPopup();
  }
});

// ── SIDEBAR ───────────────────────────────────────────────────────────────────
function renderSidebar() {
  const list=document.getElementById('chapterList'); list.innerHTML='';

  // Group chapters by story
  const storyMap = new Map();
  chapters.forEach((ch, i) => {
    const sid = ch.story_id || 'story1';
    if (!storyMap.has(sid)) storyMap.set(sid, { title: ch.story_title || sid, chapters: [] });
    storyMap.get(sid).chapters.push({ ch, globalIdx: i });
  });

  storyMap.forEach((story, sid) => {
    const isOpen = openStoryId === sid;
    const totalWords = story.chapters.reduce((n, {ch}) => n + parseVocab(ch.story).length, 0);
    const dueWords = story.chapters.reduce((n, {ch}) => {
      return n + parseVocab(ch.story).filter(v => isDue(v.word.toLowerCase())).length;
    }, 0);

    const group = document.createElement('div');
    group.className = 'story-group' + (isOpen ? ' open' : '');

    const header = document.createElement('div');
    header.className = 'story-header';
    header.innerHTML = `
      <div class="story-header-left">
        <div class="story-name">${esc(story.title)}</div>
        <div class="story-meta">${story.chapters.length} 章 · ${totalWords} 词${dueWords > 0 ? ` · <span style="color:var(--orange)">${dueWords} 待复习</span>` : ''}</div>
      </div>
      <span class="story-chevron">▼</span>`;
    header.onclick = () => {
      openStoryId = isOpen ? null : sid;
      renderSidebar();
    };

    const chList = document.createElement('div');
    chList.className = 'story-chapters';

    story.chapters.forEach(({ ch, globalIdx }) => {
      const vocab = parseVocab(ch.story);
      const due = vocab.filter(v => isDue(v.word.toLowerCase())).length;
      const chNumInStory = story.chapters.findIndex(x => x.ch.id === ch.id) + 1;
      const isRead = isChRead(ch.id);
      const el = document.createElement('div');
      el.className = 'ch-item' + (ch.id === activeId ? ' active' : '') + (isRead ? ' read' : '');
      el.innerHTML = `<div class="ch-num">${String(chNumInStory).padStart(2,'0')}</div><div class="ch-info"><div class="ch-name">${esc(ch.title)}</div><div class="ch-meta"><span class="ch-badge">${vocab.length} 词</span>${due > 0 ? `<span class="ch-due">${due} 待</span>` : ''}</div></div>`;
      el.onclick = () => { selectChapter(ch.id); closeSidebar(); };
      chList.appendChild(el);
    });

    group.appendChild(header);
    group.appendChild(chList);
    list.appendChild(group);
  });
}

function selectChapter(id) {
  activeId=id; activeTab='read'; srsAllMode=false;
  const ch = chapters.find(c=>c.id===id);
  if (ch) openStoryId = ch.story_id || 'story1';
  renderSidebar(); renderMain();
}

// ── MAIN ──────────────────────────────────────────────────────────────────────
function renderMain() {
  const main=document.getElementById('main');

  // All-chapters SRS
  if(srsAllMode || (!activeId && activeTab==='practice')) {
    main.innerHTML='<div class="srs-wrap" id="srsWrap"></div>';
    buildSrsSession(allVocabList(), document.getElementById('srsWrap'));
    return;
  }

  const ch=chapters.find(c=>c.id===activeId);
  if(!ch) return;
  const vocab=parseVocab(ch.story);
  const chIdx=chapters.indexOf(ch);

  const prevCh = chIdx > 0 ? chapters[chIdx-1] : null;
  const nextCh = chIdx < chapters.length-1 ? chapters[chIdx+1] : null;

  main.innerHTML=`
    <div class="chapter-view">
      <div class="chapter-header">
        <div class="ch-eyebrow">${esc(ch.story_title||'')} · ${vocab.length} vocabulary words</div>
        <div class="ch-title">${esc(ch.title)}</div>
      </div>
      <div class="tabs">
        <button class="tab${activeTab==='read'?' active':''}" data-t="read">阅读</button>
        <button class="tab${activeTab==='recall'?' active':''}" data-t="recall">默写</button>
        <button class="tab${activeTab==='vocab'?' active':''}" data-t="vocab">词汇</button>
        <button class="tab${activeTab==='practice'?' active':''}" data-t="practice">练习</button>
        <button class="tab${activeTab==='bookmarks'?' active':''}" data-t="bookmarks">🔖</button>
      </div>
      <div id="tabBody"></div>
    </div>`;

  main.querySelectorAll('.tab').forEach(t=>{
    t.onclick=()=>{ activeTab=t.dataset.t; main.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x.dataset.t===activeTab)); renderTab(ch,vocab); };
  });

  renderTab(ch,vocab);
}

function renderChNav(body, ch, vocab) {
  const chIdx = chapters.indexOf(ch);
  const prevCh = chIdx > 0 ? chapters[chIdx-1] : null;
  const nextCh = chIdx < chapters.length-1 ? chapters[chIdx+1] : null;
  if(!prevCh && !nextCh) return;
  const nav = document.createElement('div');
  nav.className = 'ch-nav';
  nav.innerHTML = `
    ${prevCh ? `<button class="ch-nav-btn prev" id="prevChBtn"><span class="nav-arrow">←</span><div class="nav-info"><div style="font-size:10px;text-transform:uppercase;letter-spacing:.8px;font-weight:600;margin-bottom:2px;color:var(--muted)">上一章</div><div class="ch-nav-title">${esc(prevCh.title)}</div></div></button>` : '<span></span>'}
    ${nextCh ? `<button class="ch-nav-btn next" id="nextChBtn"><div class="nav-info"><div style="font-size:10px;text-transform:uppercase;letter-spacing:.8px;font-weight:600;margin-bottom:2px;color:var(--muted)">下一章</div><div class="ch-nav-title">${esc(nextCh.title)}</div></div><span class="nav-arrow">→</span></button>` : '<span></span>'}`;
  body.appendChild(nav);
  if(prevCh) document.getElementById('prevChBtn').onclick=()=>selectChapter(prevCh.id);
  if(nextCh) document.getElementById('nextChBtn').onclick=()=>{
    markChRead(ch.id);
    selectChapter(nextCh.id);
  };
}

function renderTab(ch,vocab) {
  const body=document.getElementById('tabBody');
  progMarkTab(ch.id, activeTab);

  if(activeTab==='read') {
    body.innerHTML=`<div class="story-box"><div class="story-text">${buildReadHTML(ch.story)}</div></div>`;
    body.querySelectorAll('.vocab-chip').forEach(c=>{
      // SRS state dot
      const state = wordState(c.dataset.w.toLowerCase());
      if(state==='learning') c.classList.add('srs-learning');
      if(state==='known') c.classList.add('srs-known');
      // Bookmark state
      if(bkIsBookmarked(c.dataset.w)) c.classList.add('bookmarked');

      // Click on the word text area → show popup only
      const chipText = c.querySelector('.chip-text');
      if(chipText) {
        chipText.onclick=e=>{
          e.stopPropagation();
          hideTip();
          progMarkWord(ch.id, c.dataset.w);
          showWordPopup(c.dataset.w, c.dataset.m, ch.id, ch.title, c);
        };
      }

      // Click on speaker icon → play audio only
      const snd = c.querySelector('.snd');
      if(snd) {
        snd.onclick=e=>{
          e.stopPropagation();
          hideTip();
          playWord(c.dataset.w, c);
          progMarkWord(ch.id, c.dataset.w);
        };
      }

      // Also allow clicking the outer chip (not text or snd) for popup fallback
      c.onclick=e=>{
        if(e.target.classList.contains('snd') || e.target.closest('.snd')) return;
        if(e.target.classList.contains('chip-text') || e.target.closest('.chip-text')) return;
        e.stopPropagation();
        showWordPopup(c.dataset.w, c.dataset.m, ch.id, ch.title, c);
      };

      c.onmouseenter=e=>{ if(!wordPopup.classList.contains('show')) showTip(c.dataset.w,c.dataset.m,e); };
      c.onmouseleave=hideTip;
    });
    // Mark chapter as read when user scrolls to bottom of story
    const storyBox = body.querySelector('.story-box');
    const mainEl = document.getElementById('main');
    if(storyBox && mainEl && !isChRead(ch.id)) {
      const onScroll = () => {
        const scrollBottom = mainEl.scrollTop + mainEl.clientHeight;
        const storyBottom = storyBox.offsetTop + storyBox.offsetHeight;
        if(scrollBottom >= storyBottom - 40) {
          markChRead(ch.id);
          renderSidebar();
          mainEl.removeEventListener('scroll', onScroll);
        }
      };
      mainEl.addEventListener('scroll', onScroll);
    }
    renderChNav(body, ch, vocab);
  } else if(activeTab==='recall') {
    body.innerHTML=`<div class="hint-bar">点击任意<span style="background:var(--blue-bg);border-bottom:2px solid var(--blue-border);padding:1px 8px;border-radius:3px;">空格</span>来揭示并听单词。</div><div class="story-box"><div class="story-text">${buildRecallHTML(ch.story)}</div></div>`;
    body.querySelectorAll('.vocab-blank').forEach(b=>{
      b.onclick=()=>{
        b.classList.add('revealed');
        playWord(b.dataset.w, b);
        // Show word popup for bookmark/review on both mobile and desktop
        showWordPopup(b.dataset.w, b.dataset.m, ch.id, ch.title, b);
      };
    });
    renderChNav(body, ch, vocab);
  } else if(activeTab==='vocab') {
    body.innerHTML=`<div class="vtitle">${vocab.length} 词 · 点击行播放</div>
    <table class="vtable"><thead><tr><th>单词</th><th>释义</th><th>待复习时间</th><th style="text-align:center">收藏 / ☆复习</th></tr></thead><tbody>${vocab.map(v=>{
      const isBk = bkIsBookmarked(v.word);
      const inSrs = srsLoad()[v.word.toLowerCase()]?.introduced;
      return `<tr class="vocab-row" data-w="${esc(v.word)}" data-m="${esc(v.meaning)}">
        <td><div class="td-word"><button class="play-btn" data-w="${esc(v.word)}">▶</button>${esc(v.word)}</div></td>
        <td>${esc(v.meaning)}</td>
        <td style="font-size:11px;color:var(--muted)">${nextDueLabel(v.word.toLowerCase())}</td>
        <td>
          <div style="display:flex;gap:4px;justify-content:flex-end">
            <button class="bk-star${isBk?' active':''}" data-w="${esc(v.word)}" data-m="${esc(v.meaning)}" title="收藏">${isBk?'🔖':'☆'}</button>
            <button class="vocab-srs-btn${inSrs?' srs-in':''}" data-w="${esc(v.word)}" data-m="${esc(v.meaning)}" title="加入复习">☆复习</button>
          </div>
        </td>
      </tr>`;
    }).join('')}</tbody></table>`;
    body.querySelectorAll('.play-btn').forEach(b=>{ b.onclick=e=>{e.stopPropagation();playWord(b.dataset.w,b.closest('tr'));}; });
    body.querySelectorAll('.vocab-row').forEach(r=>{
      r.onclick=e=>{
        // Don't play if a button inside the row was clicked
        if(e.target.closest('button')) return;
        playWord(r.dataset.w,r);
      };
    });
    body.querySelectorAll('.bk-star').forEach(btn=>{
      btn.onclick=e=>{
        e.stopPropagation();
        const word = btn.dataset.w, meaning = btn.dataset.m;
        const added = bkToggle(word, meaning, ch.id, ch.title);
        btn.classList.toggle('active', added);
        btn.textContent = added ? '🔖' : '☆';
        showProgressToast(added ? '🔖 已收藏' : '已取消收藏');
      };
    });
    body.querySelectorAll('.vocab-srs-btn').forEach(btn=>{
      btn.onclick=e=>{
        e.stopPropagation();
        const word = btn.dataset.w;
        const d = srsLoad();
        if(!d[word.toLowerCase()] || !d[word.toLowerCase()].introduced) {
          srsGrade(word.toLowerCase(), 0);
        }
        btn.classList.add('srs-in');
        btn.textContent = '✓ 复习';
        showProgressToast('☆ 已加入复习');
        renderSidebar();
      };
    });
    renderChNav(body, ch, vocab);
  } else if(activeTab==='bookmarks') {
    renderBookmarksTab(body);
  } else {
    // Auto-set filter: if any words in this chapter have been added to review, default to ☆复习
    const chVocab=vocab.map(v=>({...v,chId:ch.id,chTitle:ch.title}));
    const hasIntroduced = chVocab.some(v=>{ const c=srsLoad()[v.word.toLowerCase()]; return c&&c.introduced; });
    if(hasIntroduced) srsFilter='due'; else srsFilter='all';
    body.innerHTML='<div class="srs-wrap" id="srsWrap"></div>';
    buildSrsSession(chVocab, document.getElementById('srsWrap'));
  }
}

function renderBookmarksTab(body) {
  const bks = bkLoad();
  if(!bks.length) {
    body.innerHTML=`<div class="bookmarks-wrap"><div class="bookmarks-empty"><div class="be-icon">🔖</div><p>暂无收藏。<br>阅读时点击高亮词汇，<br>点击<strong>收藏</strong>即可保存。</p></div></div>`;
    return;
  }
  body.innerHTML=`<div class="bookmarks-wrap">
    <div class="bookmarks-header">
      <div class="bookmarks-title">收藏夹 · <span style="color:var(--muted);font-size:14px;font-family:'Inter',sans-serif;font-weight:400">${bks.length} 个词</span></div>
      <button class="bookmarks-clear" id="bkClearAll">清除全部</button>
    </div>
    <div class="bookmark-list">${bks.map(b=>`
      <div class="bookmark-card" data-w="${esc(b.word)}">
        <div style="flex:1;min-width:0">
          <div class="bk-word">${esc(b.word)}</div>
          <div class="bk-meaning">${esc(b.meaning)}</div>
          ${b.chTitle?`<div class="bk-chapter">${esc(b.chTitle)}</div>`:''}
        </div>
        <div class="bk-actions">
          <button class="bk-play" data-w="${esc(b.word)}" title="播放">🔊</button>
          <button class="bk-srs" data-w="${esc(b.word)}" data-m="${esc(b.meaning)}" data-ch="${esc(b.chId||'')}" data-cht="${esc(b.chTitle||'')}">☆ 加入复习</button>
          <button class="bk-remove" data-w="${esc(b.word)}" title="移除">×</button>
        </div>
      </div>`).join('')}
    </div>
  </div>`;
  document.getElementById('bkClearAll').onclick=()=>{
    bkSave([]);
    renderTab(chapters.find(c=>c.id===activeId), parseVocab(chapters.find(c=>c.id===activeId).story));
  };
  body.querySelectorAll('.bk-play').forEach(b=>{ b.onclick=e=>{e.stopPropagation();playWord(b.dataset.w,b);}; });
  body.querySelectorAll('.bk-remove').forEach(b=>{ b.onclick=e=>{
    e.stopPropagation(); bkRemove(b.dataset.w);
    const ch=chapters.find(c=>c.id===activeId);
    renderTab(ch, parseVocab(ch.story));
  }; });
  body.querySelectorAll('.bk-srs').forEach(b=>{ b.onclick=e=>{
    e.stopPropagation();
    const d = srsLoad();
    if(!d[b.dataset.w.toLowerCase()] || !d[b.dataset.w.toLowerCase()].introduced) {
      srsGrade(b.dataset.w.toLowerCase(), 0);
    }
    showProgressToast('☆ 已加入复习');
    renderSidebar();
  }; });
}

// ── SRS SESSION ───────────────────────────────────────────────────────────────
function buildSrsSession(vocabList, wrap) {
  const introduced=vocabList.filter(v=>{ const c=srsLoad()[v.word.toLowerCase()]; return c&&c.introduced; });
  // "due" filter = all words added to review (introduced); "all" = every word in chapter
  const queue=srsFilter==='due'?introduced:vocabList;

  wrap.innerHTML=`
    <div class="srs-filter">
      <span class="srs-fl">显示:</span>
      <button class="srs-fb${srsFilter==='due'?' active':''}" id="fbDue">☆ 复习</button>
      <button class="srs-fb${srsFilter==='all'?' active':''}" id="fbAll">全部词汇</button>
    </div>
    <div id="cardArea"></div>`;

  document.getElementById('fbDue').onclick=()=>{ srsFilter='due'; renderMain(); };
  document.getElementById('fbAll').onclick=()=>{ srsFilter='all'; renderMain(); };

  if(queue.length===0) {
    document.getElementById('cardArea').innerHTML=`<div class="srs-done"><div class="di">🎉</div><h3>今日已完成</h3><p>暂无待复习卡片。点击下方学习新词汇。</p><button class="btn btn-primary" onclick="srsFilter='all';renderMain()">学习全部 ${vocabList.length} 个词</button></div>`;
    return;
  }

  srsQueue=[...queue].sort(()=>Math.random()-0.5);
  srsIdx=0; srsRevealed=false;
  renderCard(vocabList);
}

function renderCard(vocabList) {
  const area=document.getElementById('cardArea');
  if(!area) return;
  if(srsIdx>=srsQueue.length) {
    area.innerHTML=`<div class="srs-done"><div class="di">✅</div><h3>本轮完成</h3><p>已复习 ${srsQueue.length} 个词。</p><button class="btn btn-ghost" onclick="renderMain()">再来一轮</button></div>`;
    renderSidebar(); return;
  }

  const v=srsQueue[srsIdx];
  const prog=`${srsIdx+1} / ${srsQueue.length}`;
  const ch=chapters.find(c=>c.id===v.chId);
  const ctx=ch?getContext(ch.story,v.word):'';

  if(!srsRevealed) {
    area.innerHTML=`
      <div class="srs-card">
        <div class="srs-ch">${esc(v.chTitle||'')}</div>
        <div class="srs-meaning">${esc(v.meaning)}</div>
        <div class="srs-prog">${prog}</div>
      </div>
      <button class="srs-reveal" id="revBtn">Reveal English word →</button>`;
    document.getElementById('revBtn').onclick=()=>{ srsRevealed=true; playWord(v.word,null); renderCard(vocabList); };
  } else {
    const ctxHtml=ctx?ctx.replace('__B__',`<span class="bw">${esc(v.word)}</span>`):'';
    area.innerHTML=`
      <div class="srs-card">
        <div class="srs-ch">${esc(v.chTitle||'')}</div>
        <div style="display:flex;align-items:center;gap:12px">
          <div class="srs-word">${esc(v.word)}</div>
          <button class="srs-play" id="srsPlayBtn">🔊</button>
        </div>
        <div class="srs-meaning">${esc(v.meaning)}</div>
        ${ctxHtml?`<div class="srs-ctx">${ctxHtml}</div>`:''}
        <div class="srs-prog">${prog}</div>
      </div>
      <div class="srs-grades">
        <button class="srs-g again" id="gAgain">Again<span class="gl">Didn't know</span></button>
        <button class="srs-g hard" id="gHard">Hard<span class="gl">Struggled</span></button>
        <button class="srs-g good" id="gGood">Got it!<span class="gl">Knew it</span></button>
      </div>`;

    document.getElementById('srsPlayBtn').onclick=()=>playWord(v.word,document.getElementById('srsPlayBtn'));
    const grade=g=>{ srsGrade(v.word.toLowerCase(),g); srsIdx++; srsRevealed=false; renderCard(vocabList); renderSidebar(); };
    document.getElementById('gAgain').onclick=()=>grade(0);
    document.getElementById('gHard').onclick=()=>grade(1);
    document.getElementById('gGood').onclick=()=>grade(2);
  }
}

// ── HTML BUILDERS ─────────────────────────────────────────────────────────────
function buildReadHTML(story) {
  return story.split('\n').filter(l=>l.trim()).map(p=>`<p>${p.replace(/\{\{([^|]+)\|([^}]+)\}\}/g,(_,w,m)=>`<span class="vocab-chip" data-w="${esc(w.trim())}" data-m="${esc(m.trim())}"><span class="chip-text">${esc(w.trim())}<span class="meaning">(${esc(m.trim())})</span></span><span class="snd" data-w="${esc(w.trim())}">🔊</span></span>`)}</p>`).join('');
}

function buildRecallHTML(story) {
  return story.split('\n').filter(l=>l.trim()).map(p=>`<p>${p.replace(/\{\{([^|]+)\|([^}]+)\}\}/g,(_,w,m)=>`<span class="vocab-blank" data-w="${esc(w.trim())}" data-m="${esc(m.trim())}"><span class="wr">${esc(w.trim())}</span></span>`)}</p>`).join('');
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── STATUS ────────────────────────────────────────────────────────────────────
function checkAudio() {
  const dot=document.getElementById('statusDot'), label=document.getElementById('statusLabel');
  if(!chapters.length){ label.textContent='no chapters'; return; }
  const vocab=parseVocab(chapters[0].story);
  if(!vocab.length) return;
  const a=new Audio(af(vocab[0].word));
  a.oncanplaythrough=()=>{ dot.classList.add('ok'); label.textContent='audio ready'; };
  a.onerror=()=>{ label.textContent='run generate-audio.js'; };
  a.load();
}

document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ closeSidebar(); hideTip(); } });

init();
</script>
