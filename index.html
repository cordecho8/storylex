<script>
// ── ACCESS GATE ───────────────────────────────────────────────────────────────
// Auth state is stored in localStorage so the user stays logged in
// across sessions unless they manually clear their browser data.
const AUTH_KEY = 'se_auth_v1';

function isAuthed() {
  try { return !!localStorage.getItem(AUTH_KEY); } catch(e) { return false; }
}

function saveAuth(code) {
  try { localStorage.setItem(AUTH_KEY, code); } catch(e) {}
}

function validateCode(input) {
  const clean = input.trim().toUpperCase().replace(/[^A-Z0-9]/g, '');
  // Must be 4 letters + 4 digits, ending in 88, no 4s anywhere
  if (!/^[A-Z]{4}[0-9]{4}$/.test(clean)) return false;
  if (/4/.test(clean)) return false;
  if (!clean.endsWith('88')) return false;
  return (typeof VALID_CODES !== 'undefined') && VALID_CODES.includes(clean);
}

function bootGate() {
  const gate = document.getElementById('gate');

  // Already authenticated — hide gate immediately and launch app
  if (isAuthed()) {
    gate.classList.add('hidden');
    return;
  }

  // Show gate, wire up interactions
  const input = document.getElementById('gateInput');
  const btn   = document.getElementById('gateBtn');
  const err   = document.getElementById('gateError');

  // Auto-format: uppercase + strip non-alphanumeric as user types
  input.addEventListener('input', () => {
    const pos = input.selectionStart;
    input.value = input.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
    input.setSelectionRange(pos, pos);
    input.classList.remove('error');
    err.textContent = '';
  });

  // Submit on Enter
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') attemptUnlock();
  });

  btn.addEventListener('click', attemptUnlock);

  function attemptUnlock() {
    const code = input.value.trim().toUpperCase();

    if (code.length === 0) {
      showError('Please enter your access code.');
      return;
    }
    if (code.length !== 8) {
      showError('Code must be 8 characters (4 letters + 4 numbers).');
      shakeInput();
      return;
    }
    if (!validateCode(code)) {
      showError('Invalid code. Please check and try again.');
      shakeInput();
      return;
    }

    // Valid — save and launch
    input.classList.add('success');
    err.style.color = '#16a34a';
    err.textContent = 'Code accepted! Loading…';
    btn.disabled = true;

    saveAuth(code);

    setTimeout(() => {
      gate.style.transition = 'opacity 0.4s ease';
      gate.style.opacity = '0';
      setTimeout(() => { gate.classList.add('hidden'); gate.style.opacity = ''; }, 400);
    }, 600);
  }

  function showError(msg) {
    err.style.color = '#ef4444';
    err.textContent = msg;
  }

  function shakeInput() {
    input.classList.remove('error');
    void input.offsetWidth; // force reflow to restart animation
    input.classList.add('error');
  }
}

bootGate();

// ── SRS ENGINE (SM-2 simplified) ─────────────────────────────────────────────
const SRS_KEY = 'se_srs_v2';
function srsLoad() { try { return JSON.parse(localStorage.getItem(SRS_KEY)||'{}'); } catch(e) { return {}; } }
function srsSave(d) { try { localStorage.setItem(SRS_KEY, JSON.stringify(d)); } catch(e) {} }

function srsGrade(word, g) {
  const data = srsLoad();
  let c = data[word] || { interval:0, ease:2.5, due:0, reps:0, introduced:false };
  c.introduced = true; // mark as entered into SRS system
  if (g===0) { c.interval=1; c.ease=Math.max(1.3,c.ease-0.2); c.reps=0; }
  else if (g===1) { c.interval=c.reps===0?1:Math.max(1,Math.round(c.interval*1.2)); c.ease=Math.max(1.3,c.ease-0.15); c.reps++; }
  else { c.interval=c.reps===0?1:c.reps===1?3:Math.round(c.interval*c.ease); c.ease=Math.min(3.0,c.ease+0.1); c.reps++; }
  c.due = Date.now() + c.interval*86400000;
  data[word]=c; srsSave(data); return c;
}

function isDue(word) {
  const c = srsLoad()[word];
  // A word is only "due" if it has been studied at least once AND is past its due date
  if (!c || !c.introduced) return false;
  return c.due <= Date.now();
}

function wordState(word) {
  const c = srsLoad()[word];
  if (!c || !c.introduced) return 'new';
  if (!c.reps) return 'new';
  if (c.due<=Date.now()) return 'due';
  if (c.reps>=3) return 'known';
  return 'learning';
}

function nextDueLabel(word) {
  const c = srsLoad()[word];
  if (!c || !c.introduced) return '—';
  if (c.due<=Date.now()) return 'Due now';
  const d = Math.round((c.due-Date.now())/86400000);
  return d<1?'< 1 day':`${d} day${d!==1?'s':''}`;
}

// ── BOOKMARK ENGINE ───────────────────────────────────────────────────────────
const BK_KEY = 'se_bookmarks_v1';
function bkLoad() { try { return JSON.parse(localStorage.getItem(BK_KEY)||'[]'); } catch(e) { return []; } }
function bkSave(d) { try { localStorage.setItem(BK_KEY, JSON.stringify(d)); } catch(e) {} }
function bkIsBookmarked(word) { return bkLoad().some(b=>b.word.toLowerCase()===word.toLowerCase()); }
function bkAdd(word, meaning, chId, chTitle) {
  const d = bkLoad().filter(b=>b.word.toLowerCase()!==word.toLowerCase());
  d.unshift({word,meaning,chId,chTitle,addedAt:Date.now()});
  bkSave(d);
}
function bkRemove(word) {
  bkSave(bkLoad().filter(b=>b.word.toLowerCase()!==word.toLowerCase()));
}
function bkToggle(word, meaning, chId, chTitle) {
  if(bkIsBookmarked(word)) { bkRemove(word); return false; }
  else { bkAdd(word,meaning,chId,chTitle); return true; }
}

// ── PROGRESS TRACKING ─────────────────────────────────────────────────────────
const PROG_KEY = 'se_progress_v1';
function progLoad() { try { return JSON.parse(localStorage.getItem(PROG_KEY)||'{}'); } catch(e) { return {}; } }
function progSave(d) { try { localStorage.setItem(PROG_KEY, JSON.stringify(d)); } catch(e) {} }
function progGet(chId) {
  const d = progLoad(); return d[chId] || { wordsHeard:[], tabsVisited:[] };
}
function progMarkWord(chId, word) {
  const d = progLoad();
  if(!d[chId]) d[chId] = {wordsHeard:[], tabsVisited:[]};
  if(!d[chId].wordsHeard.includes(word.toLowerCase())) {
    d[chId].wordsHeard.push(word.toLowerCase());
    progSave(d);
    return true;
  }
  return false;
}
function progMarkTab(chId, tab) {
  const d = progLoad();
  if(!d[chId]) d[chId] = {wordsHeard:[], tabsVisited:[]};
  if(!d[chId].tabsVisited.includes(tab)) { d[chId].tabsVisited.push(tab); progSave(d); }
}
function progPct(chId, totalWords) {
  const p = progGet(chId);
  const tabs = (p.tabsVisited||[]).length;
  const words = (p.wordsHeard||[]).length;
  // 60% words heard + 40% tabs visited (read, recall, vocab, practice = 4 tabs)
  const wordScore = totalWords > 0 ? (words/totalWords)*60 : 0;
  const tabScore = (tabs/4)*40;
  return Math.min(100, Math.round(wordScore + tabScore));
}
function isChRead(chId) {
  const d = progLoad();
  return !!(d[chId] && d[chId].read);
}
function markChRead(chId) {
  const d = progLoad();
  if(!d[chId]) d[chId] = { wordsHeard:[], tabsVisited:[] };
  d[chId].read = true;
  // Record today's date for streak tracking
  const today = new Date().toISOString().slice(0,10);
  d[chId].readDate = today;
  // Update streak log
  try {
    const STREAK_KEY = 'se_streak_v1';
    let log = JSON.parse(localStorage.getItem(STREAK_KEY)||'[]');
    if(!log.includes(today)) { log.push(today); localStorage.setItem(STREAK_KEY, JSON.stringify(log)); }
  } catch(e) {}
  progSave(d);
}

function calcStreak() {
  try {
    const STREAK_KEY = 'se_streak_v1';
    const log = JSON.parse(localStorage.getItem(STREAK_KEY)||'[]');
    if(!log.length) return 0;
    const days = log.map(d=>new Date(d).getTime()).sort((a,b)=>b-a);
    const today = new Date(); today.setHours(0,0,0,0);
    let streak = 0, check = today.getTime();
    for(const d of days) {
      const day = new Date(d); day.setHours(0,0,0,0);
      if(day.getTime()===check) { streak++; check -= 86400000; }
      else if(day.getTime() < check) break;
    }
    return streak;
  } catch(e) { return 0; }
}

let progressToastTimer = null;
function showProgressToast(msg) {
  const old = document.querySelector('.progress-toast');
  if(old) old.remove();
  if(progressToastTimer) clearTimeout(progressToastTimer);
  const t = document.createElement('div');
  t.className = 'progress-toast';
  t.textContent = msg;
  document.body.appendChild(t);
  progressToastTimer = setTimeout(()=>{
    t.classList.add('out');
    setTimeout(()=>t.remove(), 200);
  }, 2000);
}

// ── APP STATE ─────────────────────────────────────────────────────────────────
let chapters=[], activeId=null, activeTab='read', openStoryId=null;
let currentAudio=null, currentPlayingEl=null;
let srsQueue=[], srsIdx=0, srsRevealed=false, srsFilter='all', srsAllMode=false;

// ── INIT ──────────────────────────────────────────────────────────────────────
function init() {
  if (window.CHAPTERS) chapters=[...window.CHAPTERS];
  if (chapters.length) openStoryId = chapters[0].story_id || 'story1';
  // Restore font size preference
  const savedSize = parseInt(localStorage.getItem('se_fontsize')||'17');
  document.documentElement.style.setProperty('--story-size', savedSize+'px');
  renderSidebar();
  if (chapters.length) selectChapter(chapters[0].id);
  checkAudio();
  document.getElementById('menuBtn').onclick=toggleSidebar;
  document.getElementById('overlay').onclick=closeSidebar;
  document.getElementById('allSrsBtn').onclick=()=>{ srsAllMode=true; activeId=null; activeTab='practice'; srsFilter='due'; renderMain(); closeSidebar(); };
}

function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('open'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('open'); }

// ── VOCAB PARSING ─────────────────────────────────────────────────────────────
function parseVocab(story) {
  const seen=new Set(), list=[];
  const re=/\{\{([^|]+)\|([^}]+)\}\}/g; let m;
  while((m=re.exec(story))!==null){ const w=m[1].trim(); if(!seen.has(w.toLowerCase())){ seen.add(w.toLowerCase()); list.push({word:w,meaning:m[2].trim()}); } }
  return list;
}

function allVocabList() {
  const seen=new Set(), list=[];
  chapters.forEach(ch=>{ parseVocab(ch.story).forEach(v=>{ if(!seen.has(v.word.toLowerCase())){ seen.add(v.word.toLowerCase()); list.push({...v,chId:ch.id,chTitle:ch.title}); } }); });
  return list;
}

function getContext(story, word) {
  const re=new RegExp(`\\{\\{${word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}\\|[^}]+\\}\\}`,'i');
  const parts=story.split('\n');
  for(const p of parts){ if(re.test(p)){ return p.replace(/\{\{([^|]+)\|([^}]+)\}\}/g,(_,w,m)=>w.trim().toLowerCase()===word.toLowerCase()?'__B__':w.trim()).trim(); } }
  return '';
}

// ── AUDIO ─────────────────────────────────────────────────────────────────────
function af(w){ return 'audio/'+w.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_-]/gi,'')+ '.mp3'; }

function playWord(word, el) {
  if(currentAudio){ currentAudio.pause(); currentAudio.currentTime=0; }
  if(currentPlayingEl){ currentPlayingEl.classList.remove('playing'); currentPlayingEl=null; }
  const a=new Audio(af(word)); currentAudio=a; currentPlayingEl=el;
  a.onplay=()=>el&&el.classList.add('playing');
  a.onended=()=>{ el&&el.classList.remove('playing'); currentAudio=null; currentPlayingEl=null; };
  a.onerror=()=>{
    el&&el.classList.remove('playing'); currentAudio=null; currentPlayingEl=null;
    if('speechSynthesis' in window){ const u=new SpeechSynthesisUtterance(word); u.lang='en-US'; u.rate=0.9; el&&(u.onstart=()=>el.classList.add('playing')); el&&(u.onend=()=>el.classList.remove('playing')); speechSynthesis.speak(u); }
  };
  a.play().catch(()=>{});
}

// ── TOOLTIP ───────────────────────────────────────────────────────────────────
const tooltip=document.getElementById('tooltip');
function showTip(w,m,e){ document.getElementById('tipW').textContent=w; document.getElementById('tipM').textContent=m; tooltip.classList.add('show'); moveTip(e); }
function moveTip(e){ let x=e.clientX-tooltip.offsetWidth/2,y=e.clientY-42; if(x<6)x=6; if(y<6)y=e.clientY+12; tooltip.style.left=x+'px'; tooltip.style.top=y+'px'; }
function hideTip(){ tooltip.classList.remove('show'); }
document.addEventListener('mousemove',e=>{ if(tooltip.classList.contains('show'))moveTip(e); });

// ── WORD POPUP ────────────────────────────────────────────────────────────────
let popupWord = null, popupMeaning = null, popupChId = null, popupChTitle = null;
const wordPopup = document.getElementById('wordPopup');

function isMobileDevice() { return window.innerWidth <= 700; }

function showWordPopup(word, meaning, chId, chTitle, targetEl) {
  popupWord = word; popupMeaning = meaning; popupChId = chId; popupChTitle = chTitle;
  if(isMobileDevice()) {
    showMobileSheet(word, meaning, chId, chTitle);
    return;
  }
  document.getElementById('wpWord').textContent = word;
  document.getElementById('wpMeaning').textContent = meaning;
  updatePopupBookmarkState();
  wordPopup.classList.add('show');
  positionPopup(targetEl);
}

// ── MOBILE BOTTOM SHEET ───────────────────────────────────────────────────────
function showMobileSheet(word, meaning, chId, chTitle) {
  const sheet = document.getElementById('mobileSheet');
  document.getElementById('msWord').textContent = word;
  document.getElementById('msMeaning').textContent = meaning;
  updateMobileSheetState();
  sheet.style.display = 'block';
}

function hideMobileSheet() {
  const sheet = document.getElementById('mobileSheet');
  const panel = document.getElementById('mobileSheetPanel');
  panel.style.animation = 'sheetDown 0.18s ease forwards';
  setTimeout(()=>{ sheet.style.display='none'; panel.style.animation=''; }, 180);
}

function updateMobileSheetState() {
  if(!popupWord) return;
  const isBk = bkIsBookmarked(popupWord);
  document.getElementById('msBkLabel').textContent = isBk ? '已收藏 ✓' : '收藏';
  document.getElementById('msBookmark').classList.toggle('active', isBk);
}

document.addEventListener('DOMContentLoaded', ()=>{
  const overlay = document.getElementById('mobileSheetOverlay');
  if(overlay) overlay.onclick = hideMobileSheet;

  const msPlayBtn = document.getElementById('msPlayBtn');
  if(msPlayBtn) msPlayBtn.onclick = (e) => {
    e.stopPropagation();
    if(popupWord) playWord(popupWord, msPlayBtn);
  };

  const msBookmark = document.getElementById('msBookmark');
  if(msBookmark) msBookmark.onclick = (e) => {
    e.stopPropagation();
    if(!popupWord) return;
    const added = bkToggle(popupWord, popupMeaning, popupChId, popupChTitle);
    updateMobileSheetState();
    document.querySelectorAll(`.vocab-chip[data-w="${CSS.escape(popupWord)}"]`).forEach(c=>{
      c.classList.toggle('bookmarked', bkIsBookmarked(popupWord));
    });
    showProgressToast(added ? '🔖 已收藏' : '已取消收藏');
  };

  const msSrs = document.getElementById('msSrs');
  if(msSrs) msSrs.onclick = (e) => {
    e.stopPropagation();
    if(!popupWord) return;
    const d = srsLoad();
    if(!d[popupWord.toLowerCase()] || !d[popupWord.toLowerCase()].introduced) {
      srsGrade(popupWord.toLowerCase(), 0);
    }
    showProgressToast('☆ 已加入复习');
    hideMobileSheet();
    renderSidebar();
  };
});

// CSS for sheet close animation (injected)
(function(){
  const s = document.createElement('style');
  s.textContent = '@keyframes sheetDown { from{transform:translateY(0)} to{transform:translateY(100%)} }';
  document.head.appendChild(s);
})();

function positionPopup(el) {
  const r = el.getBoundingClientRect();
  const pw = 210, ph = 130;
  let left = r.left + r.width/2 - pw/2;
  let top = r.bottom + 8;
  if(left < 8) left = 8;
  if(left + pw > window.innerWidth - 8) left = window.innerWidth - pw - 8;
  if(top + ph > window.innerHeight - 8) top = r.top - ph - 8;
  wordPopup.style.left = left + 'px';
  wordPopup.style.top = top + 'px';
  wordPopup.style.width = pw + 'px';
}

function hideWordPopup() { wordPopup.classList.remove('show'); }

function updatePopupBookmarkState() {
  if(!popupWord) return;
  const isBk = bkIsBookmarked(popupWord);
  document.getElementById('wpBkLabel').textContent = isBk ? '已收藏 ✓' : '收藏';
  document.getElementById('wpBookmark').classList.toggle('active', isBk);
}

document.getElementById('wpPlayBtn').onclick = (e) => {
  e.stopPropagation();
  if(popupWord) playWord(popupWord, document.getElementById('wpPlayBtn'));
};

document.getElementById('wpBookmark').onclick = (e) => {
  e.stopPropagation();
  if(!popupWord) return;
  const added = bkToggle(popupWord, popupMeaning, popupChId, popupChTitle);
  updatePopupBookmarkState();
  // Update chip appearance
  document.querySelectorAll(`.vocab-chip[data-w="${CSS.escape(popupWord)}"]`).forEach(c=>{
    c.classList.toggle('bookmarked', bkIsBookmarked(popupWord));
  });
  showProgressToast(added ? '🔖 已收藏' : '已取消收藏');
};

document.getElementById('wpSrs').onclick = (e) => {
  e.stopPropagation();
  if(!popupWord) return;
  // Introduce word to SRS immediately
  const d = srsLoad();
  if(!d[popupWord.toLowerCase()] || !d[popupWord.toLowerCase()].introduced) {
    srsGrade(popupWord.toLowerCase(), 0);
  }
  showProgressToast('☆ 已加入复习');
  hideWordPopup();
  renderSidebar();
};

document.addEventListener('click', (e) => {
  if(!wordPopup.contains(e.target) && !e.target.classList.contains('vocab-chip')) {
    hideWordPopup();
  }
});

// ── SIDEBAR ───────────────────────────────────────────────────────────────────
function renderSidebar() {
  const list=document.getElementById('chapterList'); list.innerHTML='';

  // Group chapters by story
  const storyMap = new Map();
  chapters.forEach((ch, i) => {
    const sid = ch.story_id || 'story1';
    if (!storyMap.has(sid)) storyMap.set(sid, { title: ch.story_title || sid, chapters: [] });
    storyMap.get(sid).chapters.push({ ch, globalIdx: i });
  });

  storyMap.forEach((story, sid) => {
    const isOpen = openStoryId === sid;
    const totalWords = story.chapters.reduce((n, {ch}) => n + parseVocab(ch.story).length, 0);
    const dueWords = story.chapters.reduce((n, {ch}) => {
      return n + parseVocab(ch.story).filter(v => isDue(v.word.toLowerCase())).length;
    }, 0);

    const group = document.createElement('div');
    group.className = 'story-group' + (isOpen ? ' open' : '');

    const header = document.createElement('div');
    header.className = 'story-header';
    header.innerHTML = `
      <div class="story-header-left">
        <div class="story-name">${esc(story.title)}</div>
        <div class="story-meta">${story.chapters.length} 章 · ${totalWords} 词${dueWords > 0 ? ` · <span style="color:var(--orange)">${dueWords} 待复习</span>` : ''}</div>
      </div>
      <span class="story-chevron">▼</span>`;
    header.onclick = () => {
      openStoryId = isOpen ? null : sid;
      renderSidebar();
    };

    const chList = document.createElement('div');
    chList.className = 'story-chapters';

    story.chapters.forEach(({ ch, globalIdx }) => {
      const vocab = parseVocab(ch.story);
      const due = vocab.filter(v => isDue(v.word.toLowerCase())).length;
      const chNumInStory = story.chapters.findIndex(x => x.ch.id === ch.id) + 1;
      const isRead = isChRead(ch.id);
      const el = document.createElement('div');
      el.className = 'ch-item' + (ch.id === activeId ? ' active' : '') + (isRead ? ' read' : '');
      el.innerHTML = `<div class="ch-num">${String(chNumInStory).padStart(2,'0')}</div><div class="ch-info"><div class="ch-name">${esc(ch.title)}</div><div class="ch-meta"><span class="ch-badge">${vocab.length} 词</span>${due > 0 ? `<span class="ch-due">${due} 待</span>` : ''}</div></div>`;
      el.onclick = () => { selectChapter(ch.id); closeSidebar(); };
      chList.appendChild(el);
    });

    group.appendChild(header);
    group.appendChild(chList);
    list.appendChild(group);
  });
}

function selectChapter(id) {
  activeId=id; activeTab='read'; srsAllMode=false;
  const ch = chapters.find(c=>c.id===id);
  if (ch) openStoryId = ch.story_id || 'story1';
  renderSidebar(); renderMain();
}

// ── MAIN ──────────────────────────────────────────────────────────────────────
function renderMain() {
  const main=document.getElementById('main');

  // All-chapters SRS
  if(srsAllMode || (!activeId && activeTab==='practice')) {
    main.innerHTML='<div class="srs-wrap" id="srsWrap"></div>';
    buildSrsSession(allVocabList(), document.getElementById('srsWrap'));
    return;
  }

  const ch=chapters.find(c=>c.id===activeId);
  if(!ch) return;
  const vocab=parseVocab(ch.story);
  const chIdx=chapters.indexOf(ch);

  const prevCh = chIdx > 0 ? chapters[chIdx-1] : null;
  const nextCh = chIdx < chapters.length-1 ? chapters[chIdx+1] : null;

  // Streak calculation
  const streak = calcStreak();
  const srsData = srsLoad();
  const introduced = vocab.filter(v=>{ const c=srsData[v.word.toLowerCase()]; return c&&c.introduced; });

  main.innerHTML=`
    <div class="chapter-view">
      <div class="chapter-header">
        <div class="ch-eyebrow">${esc(ch.story_title||'Chapter')}</div>
        <div class="ch-title">${esc(ch.title)}</div>
        <div class="ch-meta-row">
          <span class="ch-meta-pill">${vocab.length} 个词汇</span>
          ${introduced.length>0 ? `<span class="ch-meta-pill" style="color:var(--accent);border-color:var(--accent-light);background:var(--accent-light)">${introduced.length} 已加入复习</span>` : ''}
          ${isChRead(ch.id) ? `<span class="ch-meta-pill" style="color:var(--accent)">✓ 已读</span>` : ''}
          ${streak>0 ? `<span class="streak-badge"><span class="streak-flame">🔥</span><span class="streak-days">${streak} 天</span></span>` : ''}
        </div>
      </div>
      <div class="tabs" id="tabBar">
        <button class="tab${activeTab==='read'?' active':''}" data-t="read">阅读</button>
        <button class="tab${activeTab==='recall'?' active':''}" data-t="recall">默写</button>
        <button class="tab${activeTab==='vocab'?' active':''}" data-t="vocab">词汇</button>
        <button class="tab${activeTab==='practice'?' active':''}" data-t="practice">练习</button>
        <button class="tab${activeTab==='bookmarks'?' active':''}" data-t="bookmarks">🔖</button>
        <div class="font-controls" id="fontControls" style="display:none">
          <button class="font-btn sz-sm" id="fontDn" title="Smaller">A−</button>
          <button class="font-btn sz-lg" id="fontUp" title="Larger">A+</button>
        </div>
      </div>
      <div id="tabBody"></div>
    </div>`;

  // Font size controls
  const FONT_KEY = 'se_fontsize';
  let storySize = parseInt(localStorage.getItem(FONT_KEY)||'17');
  function applyFontSize(sz) {
    storySize = Math.min(22, Math.max(13, sz));
    localStorage.setItem(FONT_KEY, storySize);
    document.documentElement.style.setProperty('--story-size', storySize+'px');
  }
  applyFontSize(storySize);

  function updateFontControlsVisibility() {
    const fc = document.getElementById('fontControls');
    if(fc) fc.style.display = activeTab==='read' ? 'flex' : 'none';
  }

  main.querySelectorAll('.tab').forEach(t=>{
    t.onclick=()=>{
      activeTab=t.dataset.t;
      main.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x.dataset.t===activeTab));
      updateFontControlsVisibility();
      // Re-animate tabBody on switch
      const tb = document.getElementById('tabBody');
      if(tb) { tb.style.animation='none'; void tb.offsetWidth; tb.style.animation=''; }
      renderTab(ch,vocab);
    };
  });

  const fontDn = document.getElementById('fontDn');
  const fontUp = document.getElementById('fontUp');
  if(fontDn) fontDn.onclick = () => applyFontSize(storySize - 1);
  if(fontUp) fontUp.onclick = () => applyFontSize(storySize + 1);
  updateFontControlsVisibility();

  renderTab(ch,vocab);
}

function renderChNav(body, ch, vocab) {
  const chIdx = chapters.indexOf(ch);
  const prevCh = chIdx > 0 ? chapters[chIdx-1] : null;
  const nextCh = chIdx < chapters.length-1 ? chapters[chIdx+1] : null;
  if(!prevCh && !nextCh) return;
  const nav = document.createElement('div');
  nav.className = 'ch-nav';
  nav.innerHTML = `
    ${prevCh ? `<button class="ch-nav-btn prev" id="prevChBtn"><span class="nav-arrow">←</span><div class="nav-info"><div style="font-size:10px;text-transform:uppercase;letter-spacing:.8px;font-weight:600;margin-bottom:2px;color:var(--muted)">上一章</div><div class="ch-nav-title">${esc(prevCh.title)}</div></div></button>` : '<span></span>'}
    ${nextCh ? `<button class="ch-nav-btn next" id="nextChBtn"><div class="nav-info"><div style="font-size:10px;text-transform:uppercase;letter-spacing:.8px;font-weight:600;margin-bottom:2px;color:var(--muted)">下一章</div><div class="ch-nav-title">${esc(nextCh.title)}</div></div><span class="nav-arrow">→</span></button>` : '<span></span>'}`;
  body.appendChild(nav);
  if(prevCh) document.getElementById('prevChBtn').onclick=()=>selectChapter(prevCh.id);
  if(nextCh) document.getElementById('nextChBtn').onclick=()=>{
    markChRead(ch.id);
    selectChapter(nextCh.id);
  };
}

function renderTab(ch,vocab) {
  const body=document.getElementById('tabBody');
  progMarkTab(ch.id, activeTab);

  if(activeTab==='read') {
    body.innerHTML=`<div class="story-box"><div class="story-text">${buildReadHTML(ch.story)}</div></div>`;
    body.querySelectorAll('.vocab-chip').forEach(c=>{
      // SRS state dot
      const state = wordState(c.dataset.w.toLowerCase());
      if(state==='learning') c.classList.add('srs-learning');
      if(state==='known') c.classList.add('srs-known');
      // Bookmark state
      if(bkIsBookmarked(c.dataset.w)) c.classList.add('bookmarked');

      // Click on the word text area → show popup only
      const chipText = c.querySelector('.chip-text');
      if(chipText) {
        chipText.onclick=e=>{
          e.stopPropagation();
          hideTip();
          progMarkWord(ch.id, c.dataset.w);
          showWordPopup(c.dataset.w, c.dataset.m, ch.id, ch.title, c);
        };
      }

      // Click on speaker icon → play audio only
      const snd = c.querySelector('.snd');
      if(snd) {
        snd.onclick=e=>{
          e.stopPropagation();
          hideTip();
          playWord(c.dataset.w, c);
          progMarkWord(ch.id, c.dataset.w);
        };
      }

      // Also allow clicking the outer chip (not text or snd) for popup fallback
      c.onclick=e=>{
        if(e.target.classList.contains('snd') || e.target.closest('.snd')) return;
        if(e.target.classList.contains('chip-text') || e.target.closest('.chip-text')) return;
        e.stopPropagation();
        showWordPopup(c.dataset.w, c.dataset.m, ch.id, ch.title, c);
      };

      c.onmouseenter=e=>{ if(!wordPopup.classList.contains('show')) showTip(c.dataset.w,c.dataset.m,e); };
      c.onmouseleave=hideTip;
    });
    // Mark chapter as read when user scrolls to bottom of story
    const storyBox = body.querySelector('.story-box');
    const mainEl = document.getElementById('main');
    if(storyBox && mainEl && !isChRead(ch.id)) {
      const onScroll = () => {
        const scrollBottom = mainEl.scrollTop + mainEl.clientHeight;
        const storyBottom = storyBox.offsetTop + storyBox.offsetHeight;
        if(scrollBottom >= storyBottom - 40) {
          markChRead(ch.id);
          renderSidebar();
          mainEl.removeEventListener('scroll', onScroll);
        }
      };
      mainEl.addEventListener('scroll', onScroll);
    }
    renderChNav(body, ch, vocab);
  } else if(activeTab==='recall') {
    body.innerHTML=`<div class="hint-bar">点击任意<span style="background:var(--blue-bg);border-bottom:2px solid var(--blue-border);padding:1px 8px;border-radius:3px;">空格</span>来揭示并听单词。</div><div class="story-box"><div class="story-text">${buildRecallHTML(ch.story)}</div></div>`;
    body.querySelectorAll('.vocab-blank').forEach(b=>{
      b.onclick=()=>{
        b.classList.add('revealed');
        playWord(b.dataset.w, b);
        // Show word popup for bookmark/review on both mobile and desktop
        showWordPopup(b.dataset.w, b.dataset.m, ch.id, ch.title, b);
      };
    });
    renderChNav(body, ch, vocab);
  } else if(activeTab==='vocab') {
    body.innerHTML=`<div class="vtitle">${vocab.length} 词 · 点击行播放</div>
    <table class="vtable"><thead><tr><th>单词</th><th>释义</th><th>待复习时间</th><th style="text-align:center">收藏 / ☆复习</th></tr></thead><tbody>${vocab.map(v=>{
      const isBk = bkIsBookmarked(v.word);
      const inSrs = srsLoad()[v.word.toLowerCase()]?.introduced;
      return `<tr class="vocab-row" data-w="${esc(v.word)}" data-m="${esc(v.meaning)}">
        <td><div class="td-word"><button class="play-btn" data-w="${esc(v.word)}">▶</button>${esc(v.word)}</div></td>
        <td>${esc(v.meaning)}</td>
        <td style="font-size:11px;color:var(--muted)">${nextDueLabel(v.word.toLowerCase())}</td>
        <td>
          <div style="display:flex;gap:4px;justify-content:flex-end">
            <button class="bk-star${isBk?' active':''}" data-w="${esc(v.word)}" data-m="${esc(v.meaning)}" title="收藏">${isBk?'🔖':'☆'}</button>
            <button class="vocab-srs-btn${inSrs?' srs-in':''}" data-w="${esc(v.word)}" data-m="${esc(v.meaning)}" title="加入复习">☆复习</button>
          </div>
        </td>
      </tr>`;
    }).join('')}</tbody></table>`;
    body.querySelectorAll('.play-btn').forEach(b=>{ b.onclick=e=>{e.stopPropagation();playWord(b.dataset.w,b.closest('tr'));}; });
    body.querySelectorAll('.vocab-row').forEach(r=>{
      r.onclick=e=>{
        // Don't play if a button inside the row was clicked
        if(e.target.closest('button')) return;
        playWord(r.dataset.w,r);
      };
    });
    body.querySelectorAll('.bk-star').forEach(btn=>{
      btn.onclick=e=>{
        e.stopPropagation();
        const word = btn.dataset.w, meaning = btn.dataset.m;
        const added = bkToggle(word, meaning, ch.id, ch.title);
        btn.classList.toggle('active', added);
        btn.textContent = added ? '🔖' : '☆';
        showProgressToast(added ? '🔖 已收藏' : '已取消收藏');
      };
    });
    body.querySelectorAll('.vocab-srs-btn').forEach(btn=>{
      btn.onclick=e=>{
        e.stopPropagation();
        const word = btn.dataset.w;
        const d = srsLoad();
        if(!d[word.toLowerCase()] || !d[word.toLowerCase()].introduced) {
          srsGrade(word.toLowerCase(), 0);
        }
        btn.classList.add('srs-in');
        btn.textContent = '✓ 复习';
        showProgressToast('☆ 已加入复习');
        renderSidebar();
      };
    });
    renderChNav(body, ch, vocab);
  } else if(activeTab==='bookmarks') {
    renderBookmarksTab(body);
  } else {
    // Auto-set filter: if any words in this chapter have been added to review, default to ☆复习
    const chVocab=vocab.map(v=>({...v,chId:ch.id,chTitle:ch.title}));
    const hasIntroduced = chVocab.some(v=>{ const c=srsLoad()[v.word.toLowerCase()]; return c&&c.introduced; });
    if(hasIntroduced) srsFilter='due'; else srsFilter='all';
    body.innerHTML='<div class="srs-wrap" id="srsWrap"></div>';
    buildSrsSession(chVocab, document.getElementById('srsWrap'));
  }
}

function renderBookmarksTab(body) {
  const bks = bkLoad();
  if(!bks.length) {
    body.innerHTML=`<div class="bookmarks-wrap"><div class="bookmarks-empty"><div class="be-icon">🔖</div><p>暂无收藏。<br>阅读时点击高亮词汇，<br>点击<strong>收藏</strong>即可保存。</p></div></div>`;
    return;
  }
  body.innerHTML=`<div class="bookmarks-wrap">
    <div class="bookmarks-header">
      <div class="bookmarks-title">收藏夹 · <span style="color:var(--muted);font-size:14px;font-family:'Inter',sans-serif;font-weight:400">${bks.length} 个词</span></div>
      <button class="bookmarks-clear" id="bkClearAll">清除全部</button>
    </div>
    <div class="bookmark-list">${bks.map(b=>`
      <div class="bookmark-card" data-w="${esc(b.word)}">
        <div style="flex:1;min-width:0">
          <div class="bk-word">${esc(b.word)}</div>
          <div class="bk-meaning">${esc(b.meaning)}</div>
          ${b.chTitle?`<div class="bk-chapter">${esc(b.chTitle)}</div>`:''}
        </div>
        <div class="bk-actions">
          <button class="bk-play" data-w="${esc(b.word)}" title="播放">🔊</button>
          <button class="bk-srs" data-w="${esc(b.word)}" data-m="${esc(b.meaning)}" data-ch="${esc(b.chId||'')}" data-cht="${esc(b.chTitle||'')}">☆ 加入复习</button>
          <button class="bk-remove" data-w="${esc(b.word)}" title="移除">×</button>
        </div>
      </div>`).join('')}
    </div>
  </div>`;
  document.getElementById('bkClearAll').onclick=()=>{
    bkSave([]);
    renderTab(chapters.find(c=>c.id===activeId), parseVocab(chapters.find(c=>c.id===activeId).story));
  };
  body.querySelectorAll('.bk-play').forEach(b=>{ b.onclick=e=>{e.stopPropagation();playWord(b.dataset.w,b);}; });
  body.querySelectorAll('.bk-remove').forEach(b=>{ b.onclick=e=>{
    e.stopPropagation(); bkRemove(b.dataset.w);
    const ch=chapters.find(c=>c.id===activeId);
    renderTab(ch, parseVocab(ch.story));
  }; });
  body.querySelectorAll('.bk-srs').forEach(b=>{ b.onclick=e=>{
    e.stopPropagation();
    const d = srsLoad();
    if(!d[b.dataset.w.toLowerCase()] || !d[b.dataset.w.toLowerCase()].introduced) {
      srsGrade(b.dataset.w.toLowerCase(), 0);
    }
    showProgressToast('☆ 已加入复习');
    renderSidebar();
  }; });
}

// ── SRS SESSION ───────────────────────────────────────────────────────────────
function buildSrsSession(vocabList, wrap) {
  const introduced=vocabList.filter(v=>{ const c=srsLoad()[v.word.toLowerCase()]; return c&&c.introduced; });
  // "due" filter = all words added to review (introduced); "all" = every word in chapter
  const queue=srsFilter==='due'?introduced:vocabList;

  wrap.innerHTML=`
    <div class="srs-filter">
      <span class="srs-fl">显示:</span>
      <button class="srs-fb${srsFilter==='due'?' active':''}" id="fbDue">☆ 复习</button>
      <button class="srs-fb${srsFilter==='all'?' active':''}" id="fbAll">全部词汇</button>
    </div>
    <div id="cardArea"></div>`;

  document.getElementById('fbDue').onclick=()=>{ srsFilter='due'; renderMain(); };
  document.getElementById('fbAll').onclick=()=>{ srsFilter='all'; renderMain(); };

  if(queue.length===0) {
    document.getElementById('cardArea').innerHTML=`<div class="srs-done"><div class="di">🎉</div><h3>今日已完成</h3><p>暂无待复习卡片。点击下方学习新词汇。</p><button class="btn btn-primary" onclick="srsFilter='all';renderMain()">学习全部 ${vocabList.length} 个词</button></div>`;
    return;
  }

  srsQueue=[...queue].sort(()=>Math.random()-0.5);
  srsIdx=0; srsRevealed=false; sessionGrades={good:0,hard:0,again:0};
  renderCard(vocabList);
}

// Session grade tracking
let sessionGrades = { good: 0, hard: 0, again: 0 };

function renderCard(vocabList) {
  const area=document.getElementById('cardArea');
  if(!area) return;
  if(srsIdx>=srsQueue.length) {
    // Session summary
    const total = srsQueue.length;
    area.innerHTML=`
      <div class="srs-summary">
        <span class="sum-icon">${sessionGrades.again===0 ? '🏆' : sessionGrades.good > sessionGrades.again ? '🌟' : '💪'}</span>
        <h3>本轮完成</h3>
        <div class="sum-sub">复习了 <strong>${total}</strong> 个词${total>0?' · 继续保持！':''}</div>
        <div class="sum-stats">
          <div class="sum-stat s-good"><div class="sv">${sessionGrades.good}</div><div class="sl">掌握</div></div>
          <div class="sum-stat s-hard"><div class="sv">${sessionGrades.hard}</div><div class="sl">有难度</div></div>
          <div class="sum-stat s-again"><div class="sv">${sessionGrades.again}</div><div class="sl">再试</div></div>
        </div>
        <button class="btn btn-ghost" onclick="sessionGrades={good:0,hard:0,again:0};renderMain()">再来一轮</button>
      </div>`;
    renderSidebar(); return;
  }

  const v=srsQueue[srsIdx];
  const prog=`${srsIdx+1} / ${srsQueue.length}`;
  const ch=chapters.find(c=>c.id===v.chId);
  const ctx=ch?getContext(ch.story,v.word):'';

  if(!srsRevealed) {
    // Show flip-scene with only front face visible
    area.innerHTML=`
      <div class="flip-scene" id="flipScene">
        <div class="flip-card" id="flipCard">
          <div class="flip-front">
            <div class="srs-ch">${esc(v.chTitle||'')}</div>
            <div class="srs-meaning">${esc(v.meaning)}</div>
            <div class="srs-prog">${prog}</div>
          </div>
          <div class="flip-back">
            <div class="srs-ch">${esc(v.chTitle||'')}</div>
            <div style="display:flex;align-items:center;gap:12px">
              <div class="srs-word">${esc(v.word)}</div>
              <button class="srs-play" id="srsPlayBtnB">🔊</button>
            </div>
            <div class="srs-meaning">${esc(v.meaning)}</div>
            ${ctx?`<div class="srs-ctx">${ctx.replace('__B__',`<span class="bw">${esc(v.word)}</span>`)}</div>`:''}
            <div class="srs-prog">${prog}</div>
          </div>
        </div>
      </div>
      <button class="srs-reveal" id="revBtn" style="opacity:1">Reveal English word →</button>
      <div class="srs-grades" id="gradeArea" style="opacity:0;pointer-events:none;transition:opacity 0.2s">
        <button class="srs-g again" id="gAgain">Again<span class="gl">Didn't know</span></button>
        <button class="srs-g hard"  id="gHard">Hard<span class="gl">Struggled</span></button>
        <button class="srs-g good"  id="gGood">Got it!<span class="gl">Knew it</span></button>
      </div>`;

    const revBtn = document.getElementById('revBtn');
    revBtn.onclick=()=>{
      // Flip the card
      document.getElementById('flipCard').classList.add('flipped');
      revBtn.style.opacity='0'; revBtn.style.pointerEvents='none';
      playWord(v.word, null);
      // After flip completes, show grade buttons
      setTimeout(()=>{
        revBtn.style.display='none';
        const ga=document.getElementById('gradeArea');
        if(ga){ ga.style.opacity='1'; ga.style.pointerEvents='auto'; }
        srsRevealed=true;
        wireGradeButtons(vocabList, v);
      }, 420);
    };
    // Pre-wire play button on back face (may already be rendered)
    setTimeout(()=>{
      const pb=document.getElementById('srsPlayBtnB');
      if(pb) pb.onclick=()=>playWord(v.word,pb);
    }, 50);

  } else {
    // Already revealed — just show back + grade buttons (e.g. after re-render)
    const ctxHtml=ctx?ctx.replace('__B__',`<span class="bw">${esc(v.word)}</span>`):'';
    area.innerHTML=`
      <div class="srs-card" id="activeCard">
        <div class="srs-ch">${esc(v.chTitle||'')}</div>
        <div style="display:flex;align-items:center;gap:12px">
          <div class="srs-word">${esc(v.word)}</div>
          <button class="srs-play" id="srsPlayBtn">🔊</button>
        </div>
        <div class="srs-meaning">${esc(v.meaning)}</div>
        ${ctxHtml?`<div class="srs-ctx">${ctxHtml}</div>`:''}
        <div class="srs-prog">${prog}</div>
      </div>
      <div class="srs-grades">
        <button class="srs-g again" id="gAgain">Again<span class="gl">Didn't know</span></button>
        <button class="srs-g hard"  id="gHard">Hard<span class="gl">Struggled</span></button>
        <button class="srs-g good"  id="gGood">Got it!<span class="gl">Knew it</span></button>
      </div>`;
    document.getElementById('srsPlayBtn').onclick=()=>playWord(v.word,document.getElementById('srsPlayBtn'));
    wireGradeButtons(vocabList, v);
  }
}

function wireGradeButtons(vocabList, v) {
  function grade(g, exitClass, tick) {
    // Track session
    if(g===2) sessionGrades.good++;
    else if(g===1) sessionGrades.hard++;
    else sessionGrades.again++;

    // Animate card exit
    const card = document.getElementById('activeCard') || document.getElementById('flipCard');
    if(card) {
      card.classList.add(exitClass);
      // Flash tick
      const el=document.createElement('div');
      el.className='grade-tick'; el.textContent=tick;
      document.body.appendChild(el);
      setTimeout(()=>el.remove(), 550);
      setTimeout(()=>{ srsGrade(v.word.toLowerCase(),g); srsIdx++; srsRevealed=false; renderCard(vocabList); renderSidebar(); }, 200);
    } else {
      srsGrade(v.word.toLowerCase(),g); srsIdx++; srsRevealed=false; renderCard(vocabList); renderSidebar();
    }
  }
  const gA=document.getElementById('gAgain'), gH=document.getElementById('gHard'), gG=document.getElementById('gGood');
  if(gA) gA.onclick=()=>grade(0,'card-exit-left','✗');
  if(gH) gH.onclick=()=>grade(1,'card-exit-down','～');
  if(gG) gG.onclick=()=>grade(2,'card-exit-right','✓');
}

// ── HTML BUILDERS ─────────────────────────────────────────────────────────────
function buildReadHTML(story) {
  return story.split('\n').filter(l=>l.trim()).map(p=>`<p>${p.replace(/\{\{([^|]+)\|([^}]+)\}\}/g,(_,w,m)=>`<span class="vocab-chip" data-w="${esc(w.trim())}" data-m="${esc(m.trim())}"><span class="chip-text">${esc(w.trim())}<span class="meaning">(${esc(m.trim())})</span></span><span class="snd" data-w="${esc(w.trim())}">🔊</span></span>`)}</p>`).join('');
}

function buildRecallHTML(story) {
  return story.split('\n').filter(l=>l.trim()).map(p=>`<p>${p.replace(/\{\{([^|]+)\|([^}]+)\}\}/g,(_,w,m)=>`<span class="vocab-blank" data-w="${esc(w.trim())}" data-m="${esc(m.trim())}"><span class="wr">${esc(w.trim())}</span></span>`)}</p>`).join('');
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── STATUS ────────────────────────────────────────────────────────────────────
function checkAudio() {
  const dot=document.getElementById('statusDot'), label=document.getElementById('statusLabel');
  if(!chapters.length){ label.textContent='no chapters'; return; }
  const vocab=parseVocab(chapters[0].story);
  if(!vocab.length) return;
  const a=new Audio(af(vocab[0].word));
  a.oncanplaythrough=()=>{ dot.classList.add('ok'); label.textContent='audio ready'; };
  a.onerror=()=>{ label.textContent='run generate-audio.js'; };
  a.load();
}

document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ closeSidebar(); hideTip(); } });

init();
</script>
